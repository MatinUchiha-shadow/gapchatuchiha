<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GapChat — چت خصوصی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0b0d12;
  --surface: #13161f;
  --panel: #1a1e2a;
  --border: #252a3a;
  --accent: #7c6dfa;
  --accent2: #fa6d9b;
  --teal: #2dd4bf;
  --text: #e2e5f0;
  --muted: #6b7094;
  --r: 16px;
  --font: 'Vazirmatn', system-ui, sans-serif;
  --ease: .18s cubic-bezier(.4,0,.2,1);
}
[data-theme=light]{
  --bg:#f2f4fb; --surface:#fff; --panel:#e8ebf7; --border:#d0d5ea;
  --text:#1a1d2e; --muted:#6b6f8a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background var(--ease),color var(--ease)}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh}

/* ── LOGIN SCREEN ── */
#login{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:32px;padding:24px;
}
.login-logo{
  width:72px;height:72px;border-radius:22px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:32px;
  box-shadow:0 8px 32px rgba(124,109,250,.35);
}
.login-title{font-size:26px;font-weight:700;text-align:center}
.login-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.7;max-width:300px}
.login-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:28px 24px;width:100%;max-width:340px;
  display:flex;flex-direction:column;gap:16px;
}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:12px;color:var(--muted);font-weight:500}
.input-field{
  padding:12px 14px;background:var(--panel);
  border:1.5px solid var(--border);border-radius:12px;
  font-size:14px;transition:border-color var(--ease);
}
.input-field:focus{border-color:var(--accent)}
.avatar-row{display:flex;gap:10px;flex-wrap:wrap}
.avatar-opt{
  width:44px;height:44px;border-radius:12px;font-size:22px;
  background:var(--panel);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--ease);
}
.avatar-opt:hover{border-color:var(--accent);transform:scale(1.08)}
.avatar-opt.selected{border-color:var(--accent);background:rgba(124,109,250,.15)}
.join-btn{
  padding:13px;border-radius:12px;font-size:15px;font-weight:600;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;transition:all var(--ease);
  box-shadow:0 4px 16px rgba(124,109,250,.3);
}
.join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,109,250,.4)}
.join-btn:active{transform:translateY(0)}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;background:var(--surface);
  border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;
}
.h-left{display:flex;align-items:center;gap:10px}
.h-avatar{width:36px;height:36px;border-radius:11px;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--panel)}
.h-name{font-size:14px;font-weight:600}
.h-status{font-size:11px;color:var(--muted)}
.h-right{display:flex;gap:6px}
.icon-btn{
  width:34px;height:34px;border-radius:10px;background:var(--panel);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background var(--ease),transform var(--ease);
}
.icon-btn:hover{background:var(--border);transform:scale(1.05)}
.online-pill{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:99px;
  background:rgba(45,212,191,.1);font-size:11px;color:var(--teal);
}
.odot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MESSAGES ── */
#messages{
  flex:1;overflow-y:auto;padding:16px 14px;
  display:flex;flex-direction:column;gap:4px;
}
.day-sep{
  text-align:center;font-size:11px;color:var(--muted);
  position:relative;margin:12px 0;
}
.day-sep span{
  background:var(--bg);padding:0 10px;position:relative;z-index:1;
  transition:background var(--ease);
}
.day-sep::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}

.msg-row{display:flex;gap:6px;align-items:flex-end;max-width:100%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-row.mine{flex-direction:row-reverse}
.msg-row + .msg-row{margin-top:2px}
.msg-row.gap-top{margin-top:10px}

.av{width:26px;height:26px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-placeholder{width:26px;flex-shrink:0}

.bubble-wrap{display:flex;flex-direction:column;max-width:68%}
.msg-row.mine .bubble-wrap{align-items:flex-end}
.sender-name{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 4px}

.bubble{
  padding:9px 13px;border-radius:16px;
  font-size:14px;line-height:1.6;word-break:break-word;
  position:relative;
}
.msg-row:not(.mine) .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-bottom-right-radius:5px;
}
.msg-row.mine .bubble{
  background:var(--accent);color:#fff;
  border-bottom-left-radius:5px;
}
.bubble-meta{
  display:flex;align-items:center;gap:4px;margin-top:4px;
  font-size:10px;color:var(--muted);padding:0 2px;
}
.msg-row.mine .bubble-meta{justify-content:flex-end;color:rgba(255,255,255,.55)}
.tick{font-size:10px}

/* reaction hover */
.bubble:hover .react-trigger{opacity:1}
.react-trigger{
  position:absolute;top:-13px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:99px;padding:2px 8px;font-size:12px;
  opacity:0;transition:opacity var(--ease);cursor:pointer;
  white-space:nowrap;display:flex;gap:4px;
}
.msg-row.mine .react-trigger{left:4px}
.msg-row:not(.mine) .react-trigger{right:4px}
.react-trigger span:hover{transform:scale(1.3)}
.react-trigger span{display:inline-block;transition:transform .1s;cursor:pointer}
.reaction-bar{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.rpill{
  background:var(--panel);border:1px solid var(--border);
  border-radius:99px;padding:2px 8px;font-size:11px;cursor:pointer;
  transition:background var(--ease);
}
.rpill:hover{background:var(--border)}

/* ── TYPING ── */
#typing{min-height:20px;padding:2px 14px 6px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.tdots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--muted);animation:db .8s infinite}
.tdots span:nth-child(2){animation-delay:.13s}
.tdots span:nth-child(3){animation-delay:.26s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* ── INPUT BAR ── */
#input-bar{
  padding:10px 14px 14px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:8px;flex-shrink:0;
}
.emoji-strip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.emoji-strip::-webkit-scrollbar{height:0}
.eq{
  width:30px;height:30px;border-radius:8px;font-size:16px;flex-shrink:0;
  background:var(--panel);display:flex;align-items:center;justify-content:center;
  transition:background var(--ease),transform var(--ease);
}
.eq:hover{background:var(--border);transform:scale(1.12)}
.irow{display:flex;gap:8px;align-items:flex-end}
#msg-input{
  flex:1;padding:10px 14px;
  background:var(--panel);border:1.5px solid var(--border);
  border-radius:14px;font-size:14px;resize:none;max-height:110px;
  line-height:1.55;transition:border-color var(--ease);
}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{
  width:42px;height:42px;border-radius:13px;flex-shrink:0;
  background:var(--accent);color:#fff;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--ease);box-shadow:0 3px 12px rgba(124,109,250,.35);
}
#send-btn:hover{transform:scale(1.06);filter:brightness(1.1)}
#send-btn:active{transform:scale(.95)}

/* ── EMPTY STATE ── */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4}
.empty-icon{font-size:44px}
.empty-txt{font-size:13px;color:var(--muted)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--panel);border:1px solid var(--border);
  padding:9px 18px;border-radius:99px;font-size:13px;
  opacity:0;transition:all .25s;pointer-events:none;z-index:99;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ERROR BANNER ── */
#err-banner{
  display:none;background:#ff2d55;color:#fff;
  font-size:12px;text-align:center;padding:6px;
}

@media(max-width:480px){
  .bubble-wrap{max-width:82%}
  #login{padding:16px}
}
</style>
</head>
<body data-theme="dark">
<div id="app">
  <div id="err-banner"></div>

  <!-- LOGIN -->
  <div id="login">
    <div class="login-logo">💬</div>
    <div>
      <div class="login-title">GapChat</div>
      <div class="login-sub" style="margin-top:6px">اسمت رو وارد کن و وارد چت بشو</div>
    </div>
    <div class="login-card">
      <div class="input-group">
        <div class="input-label">اسمت چیه؟</div>
        <input class="input-field" id="name-input" placeholder="مثلاً: علی، سارا…" maxlength="20"/>
      </div>
      <div class="input-group">
        <div class="input-label">یه آواتار انتخاب کن</div>
        <div class="avatar-row" id="avatar-row"></div>
      </div>
      <button class="join-btn" onclick="joinChat()">ورود به چت ←</button>
    </div>
  </div>

  <!-- HEADER (hidden until joined) -->
  <header id="header" style="display:none">
    <div class="h-left">
      <div class="h-avatar" id="h-avatar"></div>
      <div>
        <div class="h-name" id="h-name"></div>
        <div class="h-status" id="h-status">در حال اتصال…</div>
      </div>
    </div>
    <div class="h-right">
      <div class="online-pill" id="online-pill" style="display:none">
        <span class="odot"></span>
        <span id="online-txt">آنلاین</span>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <button class="icon-btn" onclick="leaveChat()">🚪</button>
    </div>
  </header>

  <!-- CHAT -->
  <div id="chat" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div id="messages">
      <div class="empty" id="empty-state">
        <div class="empty-icon">✨</div>
        <div class="empty-txt">اولین پیام رو بفرست!</div>
      </div>
    </div>
    <div id="typing"></div>
    <div id="input-bar">
      <div class="emoji-strip" id="emoji-strip"></div>
      <div class="irow">
        <textarea id="msg-input" rows="1" placeholder="پیام بنویس…"></textarea>
        <button id="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, set, remove, serverTimestamp, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqaqan7XuE2KyswpGz3CODzee5jmXYuRc",
  authDomain: "gapchatuchiha.firebaseapp.com",
  databaseURL: "https://gapchatuchiha-default-rtdb.firebaseio.com",
  projectId: "gapchatuchiha",
  storageBucket: "gapchatuchiha.firebasestorage.app",
  messagingSenderId: "121837659982",
  appId: "1:121837659982:web:d5ab8e44cb7b331ec0601f",
  measurementId: "G-ZWNXPZWVE1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ── REFS ── */
const msgsRef   = ref(db, 'messages');
const usersRef  = ref(db, 'online');
const typingRef = ref(db, 'typing');

/* ── STATE ── */
const AVATARS = ['🧑','👩','🧔','👱','🧑‍💻','👩‍💻','🦊','🐼','🐸','🐺'];
const EMOJIS  = ['😄','😂','❤️','🔥','👍','😍','🥺','😤','🎉','💯'];
const REACTS  = ['❤️','😂','👍','😮','🔥','😢'];

let myId   = null;
let myName = null;
let myAv   = '🧑';
let selectedAv = '🧑';
let typingTimer;
let onlineUsers = {};
let loadedIds = new Set();

/* ── BUILD AVATAR PICKER ── */
function buildAvatarPicker(){
  const row = document.getElementById('avatar-row');
  AVATARS.forEach((a,i) => {
    const btn = document.createElement('button');
    btn.className = 'avatar-opt' + (i===0 ? ' selected':'');
    btn.textContent = a;
    btn.onclick = () => {
      document.querySelectorAll('.avatar-opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAv = a;
    };
    row.appendChild(btn);
  });
  // emoji strip
  const strip = document.getElementById('emoji-strip');
  EMOJIS.forEach(e => {
    const b = document.createElement('button');
    b.className='eq'; b.textContent=e;
    b.onclick=()=>insertEmoji(e);
    strip.appendChild(b);
  });
}
buildAvatarPicker();

/* ── JOIN ── */
window.joinChat = function(){
  const n = document.getElementById('name-input').value.trim();
  if(!n){ toast('یه اسم وارد کن 😅'); return; }
  myId   = 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  myName = n;
  myAv   = selectedAv;

  // presence
  const myPresRef = ref(db, 'online/'+myId);
  set(myPresRef, { name: myName, av: myAv, ts: serverTimestamp() });
  onDisconnect(myPresRef).remove();

  // switch UI
  document.getElementById('login').style.display='none';
  document.getElementById('header').style.display='flex';
  const chatEl = document.getElementById('chat');
  chatEl.style.display='flex'; chatEl.style.flexDirection='column';
  document.getElementById('h-avatar').textContent = myAv;
  document.getElementById('h-name').textContent   = myName;
  document.getElementById('h-status').textContent = 'متصل شد';

  listenOnline();
  listenTyping();
  listenMessages();
};

/* ── ONLINE PRESENCE ── */
function listenOnline(){
  onValue(usersRef, snap => {
    onlineUsers = snap.val() || {};
    const count = Object.keys(onlineUsers).length;
    const pill = document.getElementById('online-pill');
    const txt  = document.getElementById('online-txt');
    if(count > 1){
      pill.style.display='flex';
      txt.textContent = count + ' آنلاین';
    } else {
      pill.style.display='none';
    }
    // update header status
    const others = Object.values(onlineUsers).filter(u=>u.name!==myName);
    if(others.length){
      document.getElementById('h-status').textContent = others.map(u=>u.av+' '+u.name).join(' , ') + ' اینجاست';
    } else {
      document.getElementById('h-status').textContent = 'منتظر دوستت…';
    }
  });
}

/* ── TYPING ── */
function listenTyping(){
  onValue(typingRef, snap => {
    const data = snap.val() || {};
    const typers = Object.entries(data)
      .filter(([id, v]) => id !== myId && v && v.name)
      .map(([,v])=>v.av+' '+v.name);
    const el = document.getElementById('typing');
    if(typers.length){
      el.innerHTML=`<div class="tdots"><span></span><span></span><span></span></div><span>${typers.join('، ')} داره می‌نویسه…</span>`;
    } else {
      el.innerHTML='';
    }
  });
}

function setTyping(active){
  const myTypRef = ref(db,'typing/'+myId);
  if(active){
    set(myTypRef,{name:myName, av:myAv});
    onDisconnect(myTypRef).remove();
  } else {
    remove(myTypRef);
  }
}

/* ── MESSAGES ── */
function listenMessages(){
  onChildAdded(msgsRef, snap => {
    const id  = snap.key;
    const msg = snap.val();
    if(!msg || loadedIds.has(id)) return;
    loadedIds.add(id);

    // remove empty state
    const em = document.getElementById('empty-state');
    if(em) em.remove();

    appendMessage(id, msg);
    scrollBottom();
  });
}

window.sendMsg = function(){
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if(!text || !myId) return;

  push(msgsRef, {
    uid:  myId,
    name: myName,
    av:   myAv,
    text,
    ts:   serverTimestamp(),
    reactions: {}
  });
  inp.value=''; inp.style.height='';
  setTyping(false);
  clearTimeout(typingTimer);
};

window.addReaction = function(msgId, emoji){
  const rRef = ref(db, 'messages/'+msgId+'/reactions/'+emoji);
  onValue(rRef, snap=>{
    const cur = snap.val()||0;
    set(rRef, cur+1);
  }, {onlyOnce:true});
};

let lastUid='', lastDate='';

function appendMessage(id, msg){
  const container = document.getElementById('messages');
  const dt = msg.ts ? new Date(msg.ts) : new Date();
  const dateStr = dt.toLocaleDateString('fa-IR',{weekday:'long',month:'long',day:'numeric'});

  if(dateStr !== lastDate){
    const sep=document.createElement('div');
    sep.className='day-sep';
    sep.innerHTML=`<span>${dateStr}</span>`;
    container.appendChild(sep);
    lastDate=dateStr; lastUid='';
  }

  const isMine = msg.uid === myId;
  const gapTop = msg.uid !== lastUid;
  lastUid = msg.uid;

  const timeStr = dt.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
  const reacts = msg.reactions
    ? Object.entries(msg.reactions).filter(([,c])=>c>0)
        .map(([e,c])=>`<span class="rpill" onclick="addReaction('${id}','${e}')">${e} ${c}</span>`).join('')
    : '';
  const reactBtns = REACTS.map(e=>`<span onclick="addReaction('${id}','${e}')">${e}</span>`).join('');

  const row = document.createElement('div');
  row.className=`msg-row ${isMine?'mine':''} ${gapTop?'gap-top':''}`;
  row.dataset.msgId=id;
  row.innerHTML=`
    ${gapTop
      ? `<div class="av">${msg.av||'🧑'}</div>`
      : `<div class="av-placeholder"></div>`}
    <div class="bubble-wrap">
      ${(!isMine && gapTop) ? `<div class="sender-name">${esc(msg.name)}</div>` : ''}
      <div class="bubble">
        <div class="react-trigger">${reactBtns}</div>
        ${esc(msg.text).replace(/\n/g,'<br>')}
        <div class="bubble-meta">
          <span>${timeStr}</span>
          ${isMine?'<span class="tick">✓✓</span>':''}
        </div>
      </div>
      ${reacts?`<div class="reaction-bar">${reacts}</div>`:''}
    </div>`;
  container.appendChild(row);
}

/* ── LEAVE ── */
window.leaveChat = function(){
  if(!confirm('از چت خارج بشی؟')) return;
  const myPresRef = ref(db,'online/'+myId);
  const myTypRef  = ref(db,'typing/'+myId);
  remove(myPresRef); remove(myTypRef);
  location.reload();
};

/* ── HELPERS ── */
function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function insertEmoji(e){ const i=document.getElementById('msg-input'); i.value+=e; i.focus(); }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

window.toggleTheme = function(){
  const b=document.body; const d=b.getAttribute('data-theme')==='dark';
  b.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('theme-btn').textContent=d?'🌙':'☀️';
};

/* ── INPUT EVENTS ── */
const inp=document.getElementById('msg-input');
inp.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,110)+'px';
  setTyping(!!this.value);
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>setTyping(false),2500);
});
inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});

/* ── NAME INPUT ENTER ── */
document.getElementById('name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') joinChat();
});

/* ── ERROR HANDLER ── */
window.addEventListener('unhandledrejection',e=>{
  const banner=document.getElementById('err-banner');
  banner.textContent='خطا در اتصال به Firebase — '+e.reason;
  banner.style.display='block';
});
</script>
</body>
</html>
