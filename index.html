<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GapChat</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0b0d12; --surface:#13161f; --panel:#1a1e2a; --border:#252a3a;
  --accent:#7c6dfa; --accent2:#fa6d9b; --teal:#2dd4bf; --green:#22c55e;
  --text:#e2e5f0; --muted:#6b7094; --red:#e5334a;
  --bubble-mine:#7c6dfa; --bubble-mine-text:#ffffff;
  --bubble-other:#13161f; --bubble-other-text:#e2e5f0;
  --font:'Vazirmatn',system-ui,sans-serif; --ease:.18s cubic-bezier(.4,0,.2,1);
  --radius:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background var(--ease),color var(--ease)}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh;height:calc(var(--app-vh, 100vh))}

/* ── AUTH SCREEN ── */
#auth-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;padding:24px;overflow-y:auto;
}
.auth-logo{
  width:76px;height:76px;border-radius:24px;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--teal),var(--accent));
  background-size:300% 300%;
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 8px 32px rgba(124,109,250,.4);flex-shrink:0;
  animation:logoGradient 6s ease infinite, logoFloat 3.5s ease-in-out infinite, logoIn .6s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.auth-logo::after{
  content:'';position:absolute;inset:-6px;border-radius:28px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:.35;filter:blur(14px);z-index:-1;
  animation:logoGlow 3.5s ease-in-out infinite;
}
.auth-logo span{display:inline-block;animation:logoBounce 2.6s ease-in-out infinite}
@keyframes logoGradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(-3deg)}}
@keyframes logoGlow{0%,100%{opacity:.25;transform:scale(.95)}50%{opacity:.5;transform:scale(1.08)}}
@keyframes logoIn{from{opacity:0;transform:scale(.4) rotate(-25deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes logoBounce{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-3px) scale(1.05)}50%{transform:translateY(0) scale(1)}75%{transform:translateY(1px) scale(.97)}}
.auth-title{font-size:26px;font-weight:700;animation:fadeSlideUp .6s cubic-bezier(.16,1,.3,1) .1s both}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;animation:fadeSlideUp .6s cubic-bezier(.16,1,.3,1) .2s both;box-shadow:0 20px 60px -20px rgba(0,0,0,.4)}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.auth-tabs{display:flex;background:var(--panel);border-radius:12px;padding:3px;gap:3px;position:relative}
.auth-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);transition:color var(--ease);text-align:center;position:relative;z-index:1}
.auth-tab.active{color:var(--text)}
.auth-tab.active::before{
  content:'';position:absolute;inset:0;background:var(--surface);border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:-1;
  animation:tabPop .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes tabPop{from{transform:scale(.85);opacity:.4}to{transform:scale(1);opacity:1}}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.ifield{padding:12px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;font-size:14px;width:100%;transition:border-color var(--ease);color:var(--text)}
.ifield:focus{border-color:var(--accent)}
.ifield.err{border-color:var(--red)}
.auth-btn{padding:13px;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow var(--ease),filter var(--ease);box-shadow:0 4px 16px rgba(124,109,250,.3);position:relative;overflow:hidden}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,109,250,.4)}
.auth-btn:active{transform:translateY(0) scale(.98)}
.auth-btn:disabled{opacity:.6;pointer-events:none}
.auth-err{font-size:12px;color:var(--red);text-align:center;min-height:16px}
.auth-err:not(:empty){animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}

/* avatar picker (signup) */
.av-row{display:flex;gap:8px;flex-wrap:wrap;max-height:160px;overflow-y:auto;padding:2px}
.av-opt{width:42px;height:42px;border-radius:11px;font-size:20px;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),border-color var(--ease),background var(--ease)}
.av-opt:hover{border-color:var(--accent);transform:scale(1.1) rotate(-4deg)}
.av-opt:active{transform:scale(.92)}
.av-opt.sel{border-color:var(--accent);background:rgba(124,109,250,.15);transform:scale(1.08);animation:avSel .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes avSel{0%{transform:scale(.85)}60%{transform:scale(1.18)}100%{transform:scale(1.08)}}
.signup-extra{display:flex;flex-direction:column;gap:14px;animation:fadeSlideUp .35s cubic-bezier(.16,1,.3,1) both}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;animation:fadeSlideDown .4s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hl{display:flex;align-items:center;gap:10px}
.hav{width:36px;height:36px;border-radius:11px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--panel);color:var(--text);flex-shrink:0}
.hname{font-size:14px;font-weight:600}
.hstatus{font-size:11px;color:var(--muted)}
.hr{display:flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--ease),transform .15s cubic-bezier(.34,1.56,.64,1)}
.icon-btn:hover{background:var(--border);transform:scale(1.08)}
.icon-btn:active{transform:scale(.92)}

/* ── VOICE BAR ── */
#voice-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;animation:fadeSlideDown .4s cubic-bezier(.16,1,.3,1) .05s both}
.vb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vb-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.vb-members{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.vm-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--panel);border:1px solid var(--border);font-size:12px;transition:all .25s cubic-bezier(.34,1.56,.64,1);animation:chipIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes chipIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.vm-chip.speaking{border-color:var(--green);background:rgba(34,197,94,.1);box-shadow:0 0 0 2px rgba(34,197,94,.15);animation:speakPulse 1.2s ease-in-out infinite}
@keyframes speakPulse{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.15)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.25)}}
.vm-av{font-size:13px;width:18px;height:18px;border-radius:5px;background:var(--panel);color:var(--text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vm-name{color:var(--text);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.vm-mute{font-size:10px;opacity:.6}
.vb-empty{font-size:12px;color:var(--muted);font-style:italic}
.vb-controls{display:flex;gap:6px}
.vc-btn{width:30px;height:30px;border-radius:8px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);transition:all var(--ease)}
.vc-btn.muted{background:rgba(250,109,155,.1);border-color:var(--accent2)}
.vb-join-btn{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);transition:transform .15s cubic-bezier(.34,1.56,.64,1),background var(--ease);white-space:nowrap}
.vb-join-btn:hover{background:rgba(34,197,94,.22);transform:scale(1.04)}
.vb-join-btn:active{transform:scale(.96)}
.vb-join-btn.leave{background:rgba(229,51,74,.1);color:var(--red);border-color:rgba(229,51,74,.25)}
.vb-join-btn.leave:hover{background:rgba(229,51,74,.2)}

/* ── MESSAGES ── */
#messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex;gap:6px;align-items:flex-end;animation:mi .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes mi{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.mine{flex-direction:row-reverse;animation:miMine .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes miMine{from{opacity:0;transform:translateY(14px) scale(.96) }to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.gtop{margin-top:10px}
.mav{width:26px;height:26px;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--panel);color:var(--text);animation:avPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes avPop{from{opacity:0;transform:scale(.5) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.mav-ph{width:26px;flex-shrink:0}
.bwrap{display:flex;flex-direction:column;max-width:70%}
.msg-row.mine .bwrap{align-items:flex-end}
.sname{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 3px}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-break:break-word;transition:transform .15s ease,box-shadow .15s ease}
.bubble:active{transform:scale(.985)}
.msg-row:not(.mine) .bubble{background:var(--bubble-other);color:var(--bubble-other-text);border:1px solid var(--border);border-bottom-right-radius:5px}
.msg-row.mine .bubble{background:var(--bubble-mine);color:var(--bubble-mine-text);border-bottom-left-radius:5px}
.bubble.sys{background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center;padding:5px 12px;border-radius:99px}
.msg-row.mine .bubble.sys{color:var(--muted);border-color:var(--border)}
.bmeta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px}
.msg-row.mine .bmeta{text-align:left}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4}
.empty-icon{font-size:44px;animation:emptyFloat 3s ease-in-out infinite}
@keyframes emptyFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(8deg)}}
.empty-txt{font-size:13px;color:var(--muted)}

/* ── INPUT ── */
#typing{min-height:20px;padding:2px 14px 4px;font-size:12px;color:var(--muted)}
#input-bar{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.estrip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.estrip::-webkit-scrollbar{height:0}
.eq{width:30px;height:30px;border-radius:8px;font-size:16px;flex-shrink:0;background:var(--panel);display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background var(--ease)}
.eq:hover{background:var(--border);transform:scale(1.18) rotate(-6deg)}
.eq:active{transform:scale(.9)}
.irow{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;padding:10px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;font-size:14px;resize:none;max-height:110px;line-height:1.55;transition:border-color var(--ease)}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:var(--accent);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow var(--ease);box-shadow:0 3px 12px rgba(124,109,250,.3)}
#send-btn:hover{transform:scale(1.08) rotate(-8deg)}
#send-btn:active{transform:scale(.9) rotate(0deg)}
#send-btn.sent{animation:sendPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes sendPop{0%{transform:scale(.85) rotate(0)}50%{transform:scale(1.15) rotate(-15deg)}100%{transform:scale(1) rotate(0)}}

/* ── THEME PANEL ── */
#theme-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:none;align-items:flex-end;justify-content:center;transition:background .25s ease}
#theme-overlay.show{display:flex;background:rgba(0,0,0,.5)}
#theme-panel{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.4,1)}
#theme-overlay.show #theme-panel{transform:translateY(0)}
.tp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.tp-title{font-size:16px;font-weight:700}
.tp-body{overflow-y:auto;padding:14px 18px 24px;display:flex;flex-direction:column;gap:18px}
.tp-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.tp-presets{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.tp-presets::-webkit-scrollbar{height:0}
.preset-chip{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:14px;border:1.5px solid var(--border);background:var(--panel);transition:all var(--ease)}
.preset-chip.active{border-color:var(--accent)}
.preset-swatch{width:40px;height:40px;border-radius:10px;display:flex;overflow:hidden}
.preset-swatch span{flex:1;height:100%}
.preset-label{font-size:10px;color:var(--muted)}
.color-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.color-row:last-child{border-bottom:none}
.color-row-info{display:flex;flex-direction:column;gap:2px}
.color-name{font-size:13px;font-weight:600}
.color-desc{font-size:11px;color:var(--muted)}
.color-input-wrap{position:relative;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);overflow:hidden;flex-shrink:0}
.color-input-wrap input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);cursor:pointer;border:none;padding:0}
.tp-actions{display:flex;gap:8px;padding-top:6px}
.tp-action-btn{flex:1;padding:11px;border-radius:12px;font-size:13px;font-weight:600;background:var(--panel);border:1px solid var(--border);transition:all var(--ease)}
.tp-action-btn:hover{background:var(--border)}
.tp-action-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.tp-radius-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.tp-radius-row input[type=range]{flex:1;accent-color:var(--accent)}

/* ── MISC ── */
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px) scale(.9);background:var(--panel);border:1px solid var(--border);padding:9px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:99;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
#err-bar{display:none;background:var(--red);color:#fff;font-size:12px;text-align:center;padding:7px}
@media(max-width:480px){.bwrap{max-width:82%}}
</style>
</head>
<body data-theme="dark">
<div id="app">
<div id="err-bar"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo"><span>💬</span></div>
  <div class="auth-title">GapChat</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">ورود</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">ثبت‌نام</button>
    </div>

    <!-- signup-only fields -->
    <div class="signup-extra" id="signup-extra" style="display:none">
      <div>
        <div class="lbl">اسم نمایشی</div>
        <input class="ifield" id="auth-name" placeholder="مثلاً: علی، سارا…" maxlength="20"/>
      </div>
      <div>
        <div class="lbl">آواتار</div>
        <div class="av-row" id="av-row"></div>
      </div>
    </div>

    <div>
      <div class="lbl">ایمیل</div>
      <input class="ifield" id="auth-email" type="email" placeholder="example@email.com" autocomplete="email"/>
    </div>
    <div>
      <div class="lbl">پسورد</div>
      <input class="ifield" id="auth-pass" type="password" placeholder="حداقل ۶ کاراکتر" autocomplete="current-password"/>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <button class="auth-btn" id="auth-btn" onclick="doAuth()">
      <span id="auth-btn-txt">ورود</span>
    </button>
  </div>
</div>

<!-- HEADER -->
<header id="header" style="display:none">
  <div class="hl">
    <div class="hav" id="hav"></div>
    <div>
      <div class="hname" id="hname"></div>
      <div class="hstatus" id="hstatus">متصل ✓</div>
    </div>
  </div>
  <div class="hr">
    <button class="icon-btn" onclick="openThemePanel()" title="شخصی‌سازی تم">🎨</button>
    <button class="icon-btn" onclick="signOut()" title="خروج از حساب">🚪</button>
  </div>
</header>

<!-- VOICE BAR -->
<div id="voice-bar" style="display:none">
  <div class="vb-left">
    <div>
      <div class="vb-title">🔊 روم صوتی</div>
      <div class="vb-members" id="vb-members"><span class="vb-empty">کسی اینجا نیست</span></div>
    </div>
  </div>
  <div class="vb-controls" id="vb-controls" style="display:none">
    <button class="vc-btn" id="mute-btn" onclick="toggleMute()" title="میکروفون">🎤</button>
  </div>
  <button class="vb-join-btn" id="vb-join-btn" onclick="toggleVoiceRoom()">ورود به صدا</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div id="messages">
    <div class="empty" id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-txt">اولین پیام رو بفرست!</div>
    </div>
  </div>
  <div id="typing"></div>
  <div id="input-bar">
    <div class="estrip" id="estrip"></div>
    <div class="irow">
      <textarea id="msg-input" rows="1" placeholder="پیام بنویس…"></textarea>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
</div>

<!-- THEME PANEL -->
<div id="theme-overlay" onclick="if(event.target===this) closeThemePanel()">
  <div id="theme-panel">
    <div class="tp-header">
      <div class="tp-title">🎨 شخصی‌سازی تم</div>
      <button class="icon-btn" onclick="closeThemePanel()">✕</button>
    </div>
    <div class="tp-body">
      <div>
        <div class="tp-section-title">پیش‌فرض‌ها</div>
        <div class="tp-presets" id="tp-presets"></div>
      </div>

      <div>
        <div class="tp-section-title">رنگ‌های اصلی</div>
        <div id="tp-main-colors"></div>
      </div>

let currentTheme = {};
function loadTheme(){
  const saved=localStorage.getItem('gapchat_theme');
  if(saved){ try{ currentTheme=JSON.parse(saved); }catch{ currentTheme={...THEME_PRESETS['پیش‌فرض']}; } }
  else currentTheme={...THEME_PRESETS['پیش‌فرض']};
  applyTheme();
}
function applyTheme(){
  const root=document.documentElement;
  Object.entries(currentTheme).forEach(([k,v])=>root.style.setProperty(k,v));
}
function saveTheme(){ localStorage.setItem('gapchat_theme',JSON.stringify(currentTheme)); }
function setThemeVar(key,val){ currentTheme[key]=val; applyTheme(); saveTheme(); renderThemePanel(); }
function updateRadius(val){ currentTheme['--radius']=val+'px'; document.getElementById('tp-radius-val').textContent=val+'px'; applyTheme(); saveTheme(); }
function applyPreset(name){ currentTheme={...THEME_PRESETS[name]}; if(!currentTheme['--radius']) currentTheme['--radius']='16px'; applyTheme(); saveTheme(); renderThemePanel(); }
function resetTheme(){ applyPreset('پیش‌فرض'); toast('تم بازنشانی شد'); }

function renderThemePanel(){
  /* presets */
  const presetsEl=document.getElementById('tp-presets');
  presetsEl.innerHTML='';
  Object.entries(THEME_PRESETS).forEach(([name,vars])=>{
    const isActive=JSON.stringify(vars)===JSON.stringify({...vars,...Object.fromEntries(Object.entries(currentTheme).filter(([k])=>k in vars))}) && currentTheme['--accent']===vars['--accent'] && currentTheme['--bg']===vars['--bg'];
    const chip=document.createElement('button');
    chip.className='preset-chip'+(isActive?' active':'');
    chip.onclick=()=>applyPreset(name);
    chip.innerHTML=`<div class="preset-swatch">
        <span style="background:${vars['--bg']}"></span>
        <span style="background:${vars['--accent']}"></span>
        <span style="background:${vars['--accent2']}"></span>
      </div>
      <div class="preset-label">${name}</div>`;
    presetsEl.appendChild(chip);
  });

  /* color rows */
  const mainEl=document.getElementById('tp-main-colors');
  const bubbleEl=document.getElementById('tp-bubble-colors');
  mainEl.innerHTML=''; bubbleEl.innerHTML='';
  THEME_VARS.forEach(v=>{
    const target = v.group==='main'?mainEl:bubbleEl;
    const row=document.createElement('div');
    row.className='color-row';
    const val=currentTheme[v.key]||'#000000';
    row.innerHTML=`
      <div class="color-row-info">
        <div class="color-name">${v.name}</div>
        <div class="color-desc">${v.desc}</div>
      </div>
      <div class="color-input-wrap" style="background:${val}">
        <input type="color" value="${toHex(val)}" oninput="setThemeVar('${v.key}',this.value)"/>
      </div>`;
    target.appendChild(row);
  });

  /* radius */
  const radiusVal=parseInt(currentTheme['--radius'])||16;
  document.getElementById('tp-radius').value=radiusVal;
  document.getElementById('tp-radius-val').textContent=radiusVal+'px';
}

function toHex(c){
  if(c.startsWith('#')&&(c.length===7||c.length===4)) return c.length===4? '#'+[...c.slice(1)].map(x=>x+x).join('') : c;
  /* fallback for non-hex values */
  const ctx=document.createElement('canvas').getContext('2d');
  ctx.fillStyle=c;
  return ctx.fillStyle;
}

/* ══ AUTH ACTION ══ */
window.doAuth=async function(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const dispName=document.getElementById('auth-name').value.trim();
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email||!pass){ errEl.textContent='ایمیل و پسورد رو پر کن'; return; }
  if(pass.length<6){ errEl.textContent='پسورد باید حداقل ۶ کاراکتر باشه'; return; }
  if(authMode==='signup'&&!dispName){ errEl.textContent='یه اسم نمایشی وارد کن'; return; }

  const btn=document.getElementById('auth-btn');
  btn.disabled=true;
  document.getElementById('auth-btn-txt').innerHTML='<span class="spin">⏳</span>';

  const endpoint = authMode==='login'
    ? '/auth/v1/token?grant_type=password'
    : '/auth/v1/signup';
  try{
    const body = authMode==='signup'
      ? {email,password:pass,data:{display_name:dispName,avatar:selectedAv}}
      : {email,password:pass};
    const res=await fetch(SB_URL+endpoint,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if(!res.ok){
      const msg=data.error_description||data.msg||data.error||'خطا';
      errEl.textContent=translateAuthErr(msg);
      btn.disabled=false; document.getElementById('auth-btn-txt').textContent=authMode==='login'?'ورود':'ثبت‌نام';
      return;
    }
    if(authMode==='signup'&&!data.access_token){
      errEl.textContent='';
      toast('ثبت‌نام انجام شد! حالا وارد شو ✓');
      switchTab('login'); btn.disabled=false; document.getElementById('auth-btn-txt').textContent='ورود';
      return;
    }
    localStorage.setItem('sb_session',JSON.stringify(data));
    restoreSession(data);
  }catch(e){
    errEl.textContent='مشکل اتصال به سرور';
    btn.disabled=false; document.getElementById('auth-btn-txt').textContent=authMode==='login'?'ورود':'ثبت‌نام';
  }
};

function translateAuthErr(msg){
  if(msg.includes('Invalid login')) return 'ایمیل یا پسورد اشتباهه';
  if(msg.includes('Email not confirmed')) return 'ایمیلت رو تأیید کن';
  if(msg.includes('already registered')) return 'این ایمیل قبلاً ثبت شده';
  if(msg.includes('password')) return 'پسورد خیلی ضعیفه';
  return msg;
}

function restoreSession(data){
  authToken=data.access_token;
  myEmail=data.user?.email||'';
  const meta=data.user?.user_metadata||{};
  myName=meta.display_name||myEmail.split('@')[0];
  myAv=meta.avatar||AVATARS[0];
  enterChat();
}

/* ══ API ══ */
async function api(path, opts={}){
  const headers={
    'apikey':SB_KEY,
    'Authorization':'Bearer '+(authToken||SB_KEY),
    'Content-Type':'application/json',
    'Prefer':'return=representation',
    ...(opts.headers||{})
  };
  const res=await fetch(SB_URL+path,{...opts,headers});
  if(!res.ok) throw new Error(await res.text());
  const t=await res.text(); return t?JSON.parse(t):[];
}

async function loadMessages(){
  await cleanupOldMessages();
  try{
    const rows=await api('/rest/v1/messages?order=id.asc&select=*');
    if(rows.length){const em=document.getElementById('empty-state');if(em)em.remove();}
    rows.forEach(r=>{if(r.id>lastId){appendMsg(r);lastId=r.id;}});
    scrollBottom();
  }catch(e){showErr('خطا در بارگذاری');}
}

/* پاکسازی پشتیبان سمت کلاینت: پیام‌های قدیمی‌تر از ۶ ساعت رو حذف می‌کنه
   (علاوه بر pg_cron سمت سرور، اگه به هر دلیلی فعال نباشه) */
async function cleanupOldMessages(){
  try{
    const cutoff=new Date(Date.now()-6*60*60*1000).toISOString();
    await api(`/rest/v1/messages?created_at=lt.${cutoff}`,{method:'DELETE',headers:{'Prefer':''}});
  }catch{}
}

function startPolling(){
  pollTimer=setInterval(async()=>{
    try{
      const rows=await api(`/rest/v1/messages?id=gt.${lastId}&order=id.asc&select=*`);
      if(rows.length){
        const em=document.getElementById('empty-state');if(em)em.remove();
        rows.forEach(r=>{appendMsg(r);lastId=r.id;});
        scrollBottom();
      }
    }catch{}
    await pollSignals();
  },1500);
}

window.sendMsg=async function(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||!myName) return;
  inp.value=''; inp.style.height='';
  const sb=document.getElementById('send-btn');
  sb.classList.remove('sent'); void sb.offsetWidth; sb.classList.add('sent');
  try{
    const rows=await api('/rest/v1/messages',{method:'POST',body:JSON.stringify({name:myName,avatar:myAv,text})});
    if(rows&&rows.length){const em=document.getElementById('empty-state');if(em)em.remove();if(rows[0].id>lastId){appendMsg(rows[0]);lastId=rows[0].id;scrollBottom();}}
  }catch(e){showErr('پیام ارسال نشد');inp.value=text;}
};

function appendMsg(msg){
  const container=document.getElementById('messages');
  const isMine=msg.name===myName;
  const dt=new Date(msg.created_at);
  const timeStr=dt.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
  const gapTop=msg.name!==lastUid; lastUid=msg.name;
  if(msg.text&&(msg.text.startsWith('__SIG__')||msg.text.startsWith('__PRESENCE__'))) return;
  const isSys=msg.text&&msg.text.startsWith('__EVT__');
  const displayText=isSys?msg.text.replace('__EVT__',''):esc(msg.text).replace(/\n/g,'<br>');
  const avatar=esc(msg.avatar||'🧑');
  const row=document.createElement('div');
  row.className=`msg-row ${isMine?'mine':''} ${gapTop?'gtop':''}`;
  row.innerHTML=`
    ${gapTop?`<div class="mav">${avatar}</div>`:`<div class="mav-ph"></div>`}
    <div class="bwrap">
      ${(!isMine&&gapTop&&!isSys)?`<div class="sname">${esc(msg.name)}</div>`:''}
      <div class="bubble${isSys?' sys':''}">${displayText}</div>
      ${!isSys?`<div class="bmeta">${timeStr}${isMine?' ✓✓':''}</div>`:''}
    </div>`;
  container.appendChild(row);
}

async function syncVoiceMembers(){
  try{
    const cutoff=new Date(Date.now()-10000).toISOString();
    await api(`/rest/v1/voice_presence?updated_at=lt.${cutoff}`,{method:'DELETE',headers:{'Prefer':''}});
    const rows=await api('/rest/v1/voice_presence?select=*');
    voiceMembers={};
    rows.forEach(r=>{voiceMembers[r.name]={av:r.avatar,muted:r.muted||false};});
    renderVoiceBar();
  }catch{}
}

async function heartbeat(){
  if(!inVoice||!myName) return;
  try{
    await api('/rest/v1/voice_presence',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({name:myName,avatar:myAv,muted:isMuted,updated_at:new Date().toISOString()})
    });
  }catch{}
}

window.toggleVoiceRoom=async function(){
  if(!inVoice) await joinVoiceRoom();
  else await leaveVoiceRoom();
};

async function joinVoiceRoom(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  }catch{
    toast('اجازه میکروفون داده نشد! ⚠️'); return;
  }
  inVoice=true;
  isMuted=false;
  await api('/rest/v1/voice_presence',{
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({name:myName,avatar:myAv,muted:false,updated_at:new Date().toISOString()})
  });
  await syncVoiceMembers();
  for(const peerName of Object.keys(voiceMembers)){
    if(peerName!==myName && !peers[peerName]){
      await connectToPeer(peerName, true);
    }
  }
  updateVoiceUI();
  window._hbTimer=setInterval(heartbeat,4000);
  startSpeakDetection();
  sysMsg('🎙 '+myName+' وارد روم صوتی شد');
}

async function leaveVoiceRoom(){
  inVoice=false;
  clearInterval(window._hbTimer);
  try{ await api(`/rest/v1/voice_presence?name=eq.${encodeURIComponent(myName)}`,{method:'DELETE',headers:{'Prefer':''}}); }catch{}
  for(const pn of Object.keys(peers)){
    peers[pn].pc.close();
    if(peers[pn].audioEl) peers[pn].audioEl.remove();
  }
  peers={};
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  updateVoiceUI();
  await syncVoiceMembers();
  sysMsg('🔇 '+myName+' از روم صوتی خارج شد');
}

async function connectToPeer(peerName, isInitiator){
  if(peers[peerName]) return;
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  const audioEl=document.createElement('audio');
  audioEl.autoplay=true; audioEl.playsInline=true;
  document.body.appendChild(audioEl);
  peers[peerName]={pc,audioEl};

  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack=e=>{ audioEl.srcObject=e.streams[0]; };
  pc.onicecandidate=e=>{
    if(e.candidate) sendSignal('candidate',peerName,{candidate:e.candidate});
  };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='failed'||pc.connectionState==='disconnected'){
      if(peers[peerName]){ peers[peerName].pc.close(); if(peers[peerName].audioEl) peers[peerName].audioEl.remove(); delete peers[peerName]; }
    }
  };

  if(isInitiator){
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await sendSignal('offer',peerName,{sdp:offer});
  }
}

async function sendSignal(type, toPeer, payload){
  try{
    await api('/rest/v1/signals',{
      method:'POST',
      body:JSON.stringify({from_name:myName,from_av:myAv,to_name:toPeer,type,payload:JSON.stringify(payload)})
    });
  }catch{}
}

async function pollSignals(){
  if(!myName) return;
  try{
    const rows=await api(`/rest/v1/signals?to_name=eq.${encodeURIComponent(myName)}&id=gt.${lastSignalId}&order=id.asc&select=*`);
    for(const row of rows){
      if(row.id>lastSignalId) lastSignalId=row.id;
      if(row.from_name===myName) continue;
      await handleSignal(row);
    }
  }catch{}
  await syncVoiceMembers();
  if(inVoice){
    for(const peerName of Object.keys(voiceMembers)){
      if(peerName!==myName && !peers[peerName]){
        await connectToPeer(peerName, myName>peerName);
      }
    }
  }
}

async function handleSignal(sig){
  const payload=sig.payload?JSON.parse(sig.payload):{};
  switch(sig.type){
    case 'offer':
      if(!inVoice) return;
      await connectToPeer(sig.from_name,false);
      await peers[sig.from_name].pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      const answer=await peers[sig.from_name].pc.createAnswer();
      await peers[sig.from_name].pc.setLocalDescription(answer);
      await sendSignal('answer',sig.from_name,{sdp:answer});
      break;
    case 'answer':
      if(peers[sig.from_name]){
        await peers[sig.from_name].pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      }
      break;
    case 'candidate':
      if(peers[sig.from_name]){
        try{ await peers[sig.from_name].pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); }catch{}
      }
      break;
  }
}

function startSpeakDetection(){
  if(!localStream) return;
  try{
    const ctx=new AudioContext();
    const src=ctx.createMediaStreamSource(localStream);
    const analyser=ctx.createAnalyser();
    analyser.fftSize=512;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    let speaking=false;
    setInterval(()=>{
      if(!inVoice){ return; }
      analyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      const nowSpeaking=avg>15&&!isMuted;
      if(nowSpeaking!==speaking){
        speaking=nowSpeaking;
        renderVoiceBar();
      }
    },100);
    window._localSpeaking=()=>speaking&&!isMuted;
  }catch{}
}

window.toggleMute=function(){
  isMuted=!isMuted;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('mute-btn').className='vc-btn'+(isMuted?' muted':'');
  document.getElementById('mute-btn').textContent=isMuted?'🔇':'🎤';
  heartbeat();
  renderVoiceBar();
};

function updateVoiceUI(){
  const joinBtn=document.getElementById('vb-join-btn');
  const controls=document.getElementById('vb-controls');
  if(inVoice){
    joinBtn.textContent='خروج از صدا';
    joinBtn.className='vb-join-btn leave';
    controls.style.display='flex';
  } else {
    joinBtn.textContent='ورود به صدا';
    joinBtn.className='vb-join-btn';
    controls.style.display='none';
  }
  renderVoiceBar();
}

function renderVoiceBar(){
  const wrap=document.getElementById('vb-members');
  const names=Object.keys(voiceMembers);
  if(names.length===0){
    wrap.innerHTML='<span class="vb-empty">کسی اینجا نیست</span>';
    return;
  }
  wrap.innerHTML='';
  names.forEach(n=>{
    const m=voiceMembers[n];
    const isMe=n===myName;
    const speaking=isMe&&window._localSpeaking&&window._localSpeaking();
    const chip=document.createElement('div');
    chip.className='vm-chip'+(speaking?' speaking':'');
    chip.innerHTML=`<span class="vm-av">${esc(m.av||'🧑')}</span><span class="vm-name">${esc(n)}</span>${m.muted?'<span class="vm-mute">🔇</span>':''}`;
    wrap.appendChild(chip);
  });
}

async function sysMsg(text){
  try{
    const rows=await api('/rest/v1/messages',{method:'POST',body:JSON.stringify({name:myName,avatar:myAv,text:'__EVT__'+text})});
    if(rows&&rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); if(rows[0].id>lastId){ appendMsg(rows[0]); lastId=rows[0].id; scrollBottom(); } }
  }catch{}
}

/* ══ MISC ══ */
document.getElementById('msg-input').addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,110)+'px';
});
document.getElementById('msg-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
});
document.getElementById('msg-input').addEventListener('focus',function(){
  setTimeout(()=>{ scrollBottom(); this.scrollIntoView({block:'end',behavior:'smooth'}); }, 250);
});

/* ─── MOBILE VIEWPORT FIX ───
   روی موبایل وقتی کیبورد بازه، 100vh درست محاسبه نمیشه و
   نوار ورودی پشت کیبورد یا پشت محتوا میره. این بخش با
   visualViewport ارتفاع واقعی صفحه رو محاسبه و به یه
   متغیر CSS می‌فرسته که #app از روی همون ارتفاعش رو می‌گیره. */
function setAppHeight(){
  const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  document.documentElement.style.setProperty('--app-vh', h+'px');
  scrollBottom();
}
setAppHeight();
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', ()=>setTimeout(setAppHeight,300));

function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function showErr(msg){ const e=document.getElementById('err-bar'); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',5000); }
</script>
