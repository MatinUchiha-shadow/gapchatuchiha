<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatRoom — دو نفره</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ─── TOKENS ─────────────────────────────── */
  :root {
    --bg:        #0d0f14;
    --surface:   #161922;
    --panel:     #1e2230;
    --border:    #2a2f42;
    --accent1:   #6c63ff;   /* User 1 — violet */
    --accent2:   #00d4aa;   /* User 2 — teal   */
    --text:      #e8eaf0;
    --muted:     #7a7f9a;
    --danger:    #ff5572;
    --radius-sm: 12px;
    --radius-md: 20px;
    --radius-lg: 28px;
    --font:      'Vazirmatn', system-ui, sans-serif;
    --transition: .2s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"] {
    --bg:      #f0f2f8;
    --surface: #ffffff;
    --panel:   #e4e7f3;
    --border:  #cdd0e0;
    --text:    #1a1d2e;
    --muted:   #6b6f88;
  }

  /* ─── RESET ──────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    transition: background var(--transition), color var(--transition);
  }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  input, textarea { font-family: inherit; outline: none; border: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ─── LAYOUT ─────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ─── HEADER ─────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: relative; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 38px; height: 38px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--panel); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background var(--transition), transform var(--transition);
  }
  .icon-btn:hover { background: var(--border); transform: scale(1.05); }
  .online-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--accent2);
    background: rgba(0,212,170,.12); padding: 4px 10px; border-radius: 99px;
  }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ─── USER SELECTOR ──────────────────────── */
  #user-selector {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 32px;
    animation: fadeUp .5s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .selector-title { font-size: 24px; font-weight: 700; text-align: center; }
  .selector-sub { font-size: 14px; color: var(--muted); text-align: center; max-width: 320px; line-height: 1.7; }
  .user-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .user-card {
    width: 180px; padding: 28px 20px;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: var(--radius-lg); text-align: center;
    cursor: pointer; transition: all var(--transition);
    position: relative; overflow: hidden;
  }
  .user-card::before {
    content: ''; position: absolute; inset: 0;
    opacity: 0; transition: opacity var(--transition);
  }
  .user-card[data-user="1"]::before { background: radial-gradient(circle at 50% 0%, rgba(108,99,255,.18), transparent 70%); }
  .user-card[data-user="2"]::before { background: radial-gradient(circle at 50% 0%, rgba(0,212,170,.18), transparent 70%); }
  .user-card:hover { transform: translateY(-4px); border-color: var(--accent1); }
  .user-card[data-user="2"]:hover { border-color: var(--accent2); }
  .user-card:hover::before { opacity: 1; }
  .user-avatar {
    width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .user-card[data-user="1"] .user-avatar { background: rgba(108,99,255,.2); }
  .user-card[data-user="2"] .user-avatar { background: rgba(0,212,170,.2); }
  .user-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .user-hint { font-size: 12px; color: var(--muted); }

  /* ─── CHAT AREA ──────────────────────────── */
  #chat-area { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #chat-area.active { display: flex; }

  /* ─── USER BAR ───────────────────────────── */
  .user-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .current-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .current-name { font-size: 14px; font-weight: 600; }
  .switch-btn {
    margin-right: auto; padding: 5px 14px; border-radius: 8px;
    background: var(--panel); color: var(--muted); font-size: 12px;
    transition: background var(--transition), color var(--transition);
  }
  .switch-btn:hover { background: var(--border); color: var(--text); }

  /* ─── MESSAGES ───────────────────────────── */
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .day-divider {
    text-align: center; font-size: 11px; color: var(--muted);
    position: relative; margin: 8px 0;
  }
  .day-divider span {
    background: var(--bg); padding: 0 12px; position: relative; z-index: 1;
  }
  .day-divider::before {
    content: ''; position: absolute; top: 50%; left: 0; right: 0;
    height: 1px; background: var(--border);
  }

  .msg-row { display: flex; gap: 8px; align-items: flex-end; animation: msgIn .25s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.mine { flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .msg-bubble {
    max-width: 65%; padding: 10px 14px;
    border-radius: var(--radius-md);
    line-height: 1.6; font-size: 14px; position: relative;
    word-break: break-word;
  }
  .msg-row:not(.mine) .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-right-radius: 6px;
  }
  .msg-row.mine .msg-bubble {
    border-bottom-left-radius: 6px;
    color: #fff;
  }
  .msg-row.mine[data-user="1"] .msg-bubble { background: var(--accent1); }
  .msg-row.mine[data-user="2"] .msg-bubble { background: var(--accent2); color: #000; }
  .msg-time {
    font-size: 10px; margin-top: 5px; opacity: .6; text-align: left;
    display: flex; align-items: center; gap: 4px;
  }
  .msg-row.mine .msg-time { justify-content: flex-end; text-align: right; }
  .check-icon { font-size: 11px; }

  .msg-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .msg-row.mine .msg-name { display: none; }

  /* reactions */
  .msg-bubble:hover .reaction-btn { opacity: 1; }
  .reaction-btn {
    position: absolute; top: -10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 99px; padding: 2px 6px; font-size: 11px;
    opacity: 0; transition: opacity var(--transition); cursor: pointer;
    white-space: nowrap;
  }
  .msg-row.mine .reaction-btn { left: -10px; }
  .msg-row:not(.mine) .reaction-btn { right: -10px; }
  .reactions-display { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .reaction-pill {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 99px; padding: 1px 8px; font-size: 11px;
    cursor: pointer; transition: background var(--transition);
  }
  .reaction-pill:hover { background: var(--border); }

  /* ─── TYPING ─────────────────────────────── */
  #typing-indicator {
    padding: 0 20px 8px; font-size: 12px; color: var(--muted);
    min-height: 22px; display: flex; align-items: center; gap: 8px;
  }
  .typing-dots span {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); animation: dot-bounce .9s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  /* ─── INPUT BAR ──────────────────────────── */
  #input-bar {
    padding: 12px 20px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .emoji-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .emoji-quick {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--panel); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), transform var(--transition);
  }
  .emoji-quick:hover { background: var(--border); transform: scale(1.15); }

  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  #msg-input {
    flex: 1; padding: 11px 16px;
    background: var(--panel); color: var(--text);
    border: 1.5px solid var(--border); border-radius: var(--radius-md);
    font-size: 14px; resize: none; max-height: 120px; line-height: 1.5;
    transition: border-color var(--transition);
  }
  #msg-input:focus { border-color: var(--accent1); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px; border-radius: 14px;
    background: var(--accent1); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all var(--transition); flex-shrink: 0;
  }
  #send-btn:hover { transform: scale(1.06); filter: brightness(1.1); }
  #send-btn:active { transform: scale(.96); }
  #send-btn.user2 { background: var(--accent2); color: #000; }

  /* ─── EMPTY STATE ─────────────────────────── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; opacity: .5;
  }
  .empty-icon { font-size: 48px; }
  .empty-text { font-size: 14px; color: var(--muted); }

  /* ─── TOAST ──────────────────────────────── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 99px; font-size: 13px;
    opacity: 0; transition: all .3s; pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── MEDIA ───────────────────────────────── */
  @media (max-width: 500px) {
    .msg-bubble { max-width: 82%; }
    .user-cards { flex-direction: column; }
    .user-card { width: 100%; max-width: 300px; }
  }
</style>
</head>
<body data-theme="dark">
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">💬</div>
      <div>
        <div class="header-title">ChatRoom</div>
        <div class="header-sub" id="header-sub">انتخاب کاربر</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="online-badge" id="online-badge" style="display:none">
        <span class="online-dot"></span>
        <span id="online-count">۲ آنلاین</span>
      </div>
      <button class="icon-btn" id="theme-btn" title="تغییر تم" onclick="toggleTheme()">🌙</button>
      <button class="icon-btn" title="پاک کردن چت" onclick="clearChat()">🗑️</button>
    </div>
  </header>

  <!-- USER SELECTOR -->
  <div id="user-selector">
    <div>
      <div class="selector-title">به عنوان چه کسی وارد می‌شوی؟</div>
      <div class="selector-sub" style="margin-top:8px">دو تب مرورگر باز کن و هر کدام یک کاربر انتخاب کنید</div>
    </div>
    <div class="user-cards">
      <div class="user-card" data-user="1" onclick="selectUser(1)">
        <div class="user-avatar">🧑‍💻</div>
        <div class="user-name">کاربر ۱</div>
        <div class="user-hint">رنگ بنفش</div>
      </div>
      <div class="user-card" data-user="2" onclick="selectUser(2)">
        <div class="user-avatar">👩‍🎨</div>
        <div class="user-name">کاربر ۲</div>
        <div class="user-hint">رنگ فیروزه‌ای</div>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div id="chat-area">
    <div class="user-bar">
      <div class="current-avatar" id="current-avatar"></div>
      <div class="current-name" id="current-name"></div>
      <button class="switch-btn" onclick="switchUser()">↩ تغییر کاربر</button>
    </div>
    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-text">هنوز پیامی نیست. اولین پیام را بفرست!</div>
      </div>
    </div>
    <div id="typing-indicator"></div>
    <div id="input-bar">
      <div class="emoji-row" id="emoji-row"></div>
      <div class="input-row">
        <textarea id="msg-input" rows="1" placeholder="پیام بنویس..."></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
/* ── CONFIG ── */
const EMOJIS = ['😄','😂','❤️','👍','🔥','😍','🎉','💯','😢','😮'];
const REACTIONS = ['❤️','😂','👍','😮','😢','🔥'];
const USERS = {
  1: { name: 'کاربر ۱', emoji: '🧑‍💻', accent: '#6c63ff' },
  2: { name: 'کاربر ۲', emoji: '👩‍🎨', accent: '#00d4aa' }
};

/* ── STATE ── */
let currentUser = null;
let messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
let channel;

/* ── BROADCAST CHANNEL (cross-tab) ── */
function initChannel() {
  if (typeof BroadcastChannel !== 'undefined') {
    channel = new BroadcastChannel('chatroom_v1');
    channel.onmessage = (e) => {
      const { type, payload } = e.data;
      if (type === 'message') {
        messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
        renderMessages();
      }
      if (type === 'typing') {
        showTyping(payload.user, payload.text);
      }
      if (type === 'reaction') {
        messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
        renderMessages();
      }
    };
  }
}
function broadcast(type, payload) {
  if (channel) channel.postMessage({ type, payload });
}

/* ── INIT ── */
initChannel();
buildEmojiRow();

/* ── USER SELECT ── */
function selectUser(n) {
  currentUser = n;
  const u = USERS[n];
  document.getElementById('user-selector').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.classList.add('active');
  document.getElementById('current-avatar').textContent = u.emoji;
  document.getElementById('current-avatar').style.background = n === 1 ? 'rgba(108,99,255,.2)' : 'rgba(0,212,170,.2)';
  document.getElementById('current-name').textContent = u.name;
  document.getElementById('header-sub').textContent = `${u.name} متصل شد`;
  document.getElementById('online-badge').style.display = 'flex';
  document.getElementById('send-btn').className = n === 2 ? 'user2' : '';
  document.getElementById('send-btn').id = 'send-btn'; // keep id
  renderMessages();

  // store who's open in this tab
  sessionStorage.setItem('tab_user', n);
}

function switchUser() {
  currentUser = null;
  document.getElementById('chat-area').classList.remove('active');
  document.getElementById('user-selector').style.display = 'flex';
  document.getElementById('header-sub').textContent = 'انتخاب کاربر';
  document.getElementById('online-badge').style.display = 'none';
  sessionStorage.removeItem('tab_user');
}

/* ── MESSAGES ── */
function sendMessage() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !currentUser) return;

  const msg = {
    id: Date.now() + Math.random(),
    user: currentUser,
    text,
    time: new Date().toISOString(),
    reactions: {}
  };

  messages.push(msg);
  localStorage.setItem('chat_messages', JSON.stringify(messages));
  broadcast('message', msg);

  inp.value = '';
  inp.style.height = '';
  renderMessages();
  scrollBottom();
  // clear typing
  broadcast('typing', { user: currentUser, text: '' });
}

function addReaction(msgId, emoji) {
  const msg = messages.find(m => m.id === msgId);
  if (!msg) return;
  if (!msg.reactions) msg.reactions = {};
  msg.reactions[emoji] = (msg.reactions[emoji] || 0) + 1;
  localStorage.setItem('chat_messages', JSON.stringify(messages));
  broadcast('reaction', { msgId, emoji });
  renderMessages();
}

/* ── RENDER ── */
function renderMessages() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (messages.length === 0) {
    container.innerHTML = '';
    container.appendChild(empty);
    return;
  }

  let html = '';
  let lastDate = '';

  messages.forEach(msg => {
    const dt = new Date(msg.time);
    const dateStr = dt.toLocaleDateString('fa-IR', { weekday: 'long', month: 'long', day: 'numeric' });
    if (dateStr !== lastDate) {
      html += `<div class="day-divider"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }

    const isMine = msg.user === currentUser;
    const u = USERS[msg.user];
    const timeStr = dt.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });

    const reactionBtns = REACTIONS.map(e =>
      `<button class="reaction-btn emoji-quick" onclick="addReaction(${msg.id},'${e}')">${e}</button>`
    ).join('');

    const reactionPills = msg.reactions
      ? Object.entries(msg.reactions).filter(([,c])=>c>0)
          .map(([e,c]) => `<span class="reaction-pill" onclick="addReaction(${msg.id},'${e}')">${e} ${c}</span>`).join('')
      : '';

    html += `
      <div class="msg-row ${isMine ? 'mine' : ''}" data-user="${msg.user}">
        <div class="msg-avatar" style="background:${u.accent}22">${u.emoji}</div>
        <div>
          ${!isMine ? `<div class="msg-name">${u.name}</div>` : ''}
          <div class="msg-bubble" style="position:relative">
            ${reactionBtns}
            ${escapeHtml(msg.text)}
            <div class="msg-time">
              ${timeStr}
              ${isMine ? '<span class="check-icon">✓✓</span>' : ''}
            </div>
          </div>
          ${reactionPills ? `<div class="reactions-display">${reactionPills}</div>` : ''}
        </div>
      </div>`;
  });

  container.innerHTML = html;
  scrollBottom();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

/* ── TYPING INDICATOR ── */
let typingTimeout;
function handleTyping() {
  if (!currentUser) return;
  const text = document.getElementById('msg-input').value;
  broadcast('typing', { user: currentUser, text });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => broadcast('typing', { user: currentUser, text: '' }), 2000);
}

function showTyping(user, text) {
  if (user === currentUser) return;
  const el = document.getElementById('typing-indicator');
  if (text) {
    el.innerHTML = `<span>${USERS[user]?.emoji || ''}</span>
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span style="font-size:12px;color:var(--muted)">${USERS[user]?.name} داره می‌نویسه...</span>`;
  } else {
    el.innerHTML = '';
  }
}

/* ── AUTO-RESIZE TEXTAREA ── */
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  handleTyping();
});
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

/* ── EMOJI ROW ── */
function buildEmojiRow() {
  const row = document.getElementById('emoji-row');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-quick';
    btn.textContent = e;
    btn.onclick = () => insertEmoji(e);
    row.appendChild(btn);
  });
}
function insertEmoji(e) {
  const inp = document.getElementById('msg-input');
  inp.value += e;
  inp.focus();
}

/* ── THEME ── */
function toggleTheme() {
  const body = document.body;
  const isDark = body.getAttribute('data-theme') === 'dark';
  body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('chat_theme', isDark ? 'light' : 'dark');
}
// load saved theme
const savedTheme = localStorage.getItem('chat_theme');
if (savedTheme) {
  document.body.setAttribute('data-theme', savedTheme);
  document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
}

/* ── CLEAR ── */
function clearChat() {
  if (!confirm('همه پیام‌ها پاک بشن؟')) return;
  messages = [];
  localStorage.setItem('chat_messages', JSON.stringify(messages));
  broadcast('message', null);
  renderMessages();
  showToast('چت پاک شد 🗑️');
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── storage event for same-browser different-tab fallback ── */
window.addEventListener('storage', (e) => {
  if (e.key === 'chat_messages') {
    messages = JSON.parse(e.newValue || '[]');
    renderMessages();
  }
});

// restore session
const savedUser = sessionStorage.getItem('tab_user');
if (savedUser) selectUser(parseInt(savedUser));
</script>
</body>
</html>
