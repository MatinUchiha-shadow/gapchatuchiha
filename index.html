<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GapChat</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0b0d12; --surface:#13161f; --panel:#1a1e2a; --border:#252a3a;
  --accent:#7c6dfa; --accent2:#fa6d9b; --teal:#2dd4bf; --green:#22c55e;
  --text:#e2e5f0; --muted:#6b7094; --red:#e5334a;
  --bubble-mine:#7c6dfa; --bubble-mine-text:#ffffff;
  --bubble-other:#13161f; --bubble-other-text:#e2e5f0;
  --font:'Vazirmatn',system-ui,sans-serif; --ease:.18s cubic-bezier(.4,0,.2,1);
  --radius:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background var(--ease),color var(--ease)}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh}

/* ── AUTH SCREEN ── */
#auth-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;padding:24px;overflow-y:auto;
}
.auth-logo{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(124,109,250,.35);flex-shrink:0}
.auth-title{font-size:26px;font-weight:700}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px}
.auth-tabs{display:flex;background:var(--panel);border-radius:12px;padding:3px;gap:3px}
.auth-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);transition:all var(--ease);text-align:center}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.ifield{padding:12px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;font-size:14px;width:100%;transition:border-color var(--ease);color:var(--text)}
.ifield:focus{border-color:var(--accent)}
.ifield.err{border-color:var(--red)}
.auth-btn{padding:13px;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:all var(--ease);box-shadow:0 4px 16px rgba(124,109,250,.3);position:relative}
.auth-btn:hover{transform:translateY(-1px)}
.auth-btn:disabled{opacity:.6;pointer-events:none}
.auth-err{font-size:12px;color:var(--red);text-align:center;min-height:16px}

/* avatar picker (signup) */
.av-row{display:flex;gap:8px;flex-wrap:wrap}
.av-opt{width:42px;height:42px;border-radius:11px;font-size:20px;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.av-opt:hover{border-color:var(--accent);transform:scale(1.08)}
.av-opt.sel{border-color:var(--accent);background:rgba(124,109,250,.15)}
.signup-extra{display:flex;flex-direction:column;gap:14px}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.hl{display:flex;align-items:center;gap:10px}
.hav{width:36px;height:36px;border-radius:11px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--panel);color:var(--text);flex-shrink:0}
.hname{font-size:14px;font-weight:600}
.hstatus{font-size:11px;color:var(--muted)}
.hr{display:flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--ease)}
.icon-btn:hover{background:var(--border)}

/* ── VOICE BAR ── */
#voice-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.vb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vb-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.vb-members{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.vm-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--panel);border:1px solid var(--border);font-size:12px;transition:all .2s}
.vm-chip.speaking{border-color:var(--green);background:rgba(34,197,94,.1);box-shadow:0 0 0 2px rgba(34,197,94,.15)}
.vm-av{font-size:13px;width:18px;height:18px;border-radius:5px;background:var(--panel);color:var(--text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vm-name{color:var(--text);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.vm-mute{font-size:10px;opacity:.6}
.vb-empty{font-size:12px;color:var(--muted);font-style:italic}
.vb-controls{display:flex;gap:6px}
.vc-btn{width:30px;height:30px;border-radius:8px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);transition:all var(--ease)}
.vc-btn.muted{background:rgba(250,109,155,.1);border-color:var(--accent2)}
.vb-join-btn{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);transition:all var(--ease);white-space:nowrap}
.vb-join-btn:hover{background:rgba(34,197,94,.22)}
.vb-join-btn.leave{background:rgba(229,51,74,.1);color:var(--red);border-color:rgba(229,51,74,.25)}

/* ── MESSAGES ── */
#messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex;gap:6px;align-items:flex-end;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-row.mine{flex-direction:row-reverse}
.msg-row.gtop{margin-top:10px}
.mav{width:26px;height:26px;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--panel);color:var(--text)}
.mav-ph{width:26px;flex-shrink:0}
.bwrap{display:flex;flex-direction:column;max-width:70%}
.msg-row.mine .bwrap{align-items:flex-end}
.sname{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 3px}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-break:break-word}
.msg-row:not(.mine) .bubble{background:var(--bubble-other);color:var(--bubble-other-text);border:1px solid var(--border);border-bottom-right-radius:5px}
.msg-row.mine .bubble{background:var(--bubble-mine);color:var(--bubble-mine-text);border-bottom-left-radius:5px}
.bubble.sys{background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center;padding:5px 12px;border-radius:99px}
.msg-row.mine .bubble.sys{color:var(--muted);border-color:var(--border)}
.bmeta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px}
.msg-row.mine .bmeta{text-align:left}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4}
.empty-icon{font-size:44px}
.empty-txt{font-size:13px;color:var(--muted)}

/* ── INPUT ── */
#typing{min-height:20px;padding:2px 14px 4px;font-size:12px;color:var(--muted)}
#input-bar{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.estrip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.estrip::-webkit-scrollbar{height:0}
.eq{width:30px;height:30px;border-radius:8px;font-size:16px;flex-shrink:0;background:var(--panel);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.eq:hover{background:var(--border);transform:scale(1.1)}
.irow{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;padding:10px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;font-size:14px;resize:none;max-height:110px;line-height:1.55;transition:border-color var(--ease)}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:var(--accent);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all var(--ease);box-shadow:0 3px 12px rgba(124,109,250,.3)}
#send-btn:hover{transform:scale(1.06)}
#send-btn:active{transform:scale(.95)}

/* ── THEME PANEL ── */
#theme-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
#theme-overlay.show{display:flex}
#theme-panel{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.tp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.tp-title{font-size:16px;font-weight:700}
.tp-body{overflow-y:auto;padding:14px 18px 24px;display:flex;flex-direction:column;gap:18px}
.tp-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.tp-presets{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.tp-presets::-webkit-scrollbar{height:0}
.preset-chip{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:14px;border:1.5px solid var(--border);background:var(--panel);transition:all var(--ease)}
.preset-chip.active{border-color:var(--accent)}
.preset-swatch{width:40px;height:40px;border-radius:10px;display:flex;overflow:hidden}
.preset-swatch span{flex:1;height:100%}
.preset-label{font-size:10px;color:var(--muted)}
.color-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.color-row:last-child{border-bottom:none}
.color-row-info{display:flex;flex-direction:column;gap:2px}
.color-name{font-size:13px;font-weight:600}
.color-desc{font-size:11px;color:var(--muted)}
.color-input-wrap{position:relative;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);overflow:hidden;flex-shrink:0}
.color-input-wrap input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);cursor:pointer;border:none;padding:0}
.tp-actions{display:flex;gap:8px;padding-top:6px}
.tp-action-btn{flex:1;padding:11px;border-radius:12px;font-size:13px;font-weight:600;background:var(--panel);border:1px solid var(--border);transition:all var(--ease)}
.tp-action-btn:hover{background:var(--border)}
.tp-action-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.tp-radius-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.tp-radius-row input[type=range]{flex:1;accent-color:var(--accent)}

/* ── MISC ── */
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--border);padding:9px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:99;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#err-bar{display:none;background:var(--red);color:#fff;font-size:12px;text-align:center;padding:7px}
@media(max-width:480px){.bwrap{max-width:82%}}
</style>
</head>
<body data-theme="dark">
<div id="app">
<div id="err-bar"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">💬</div>
  <div class="auth-title">GapChat</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">ورود</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">ثبت‌نام</button>
    </div>

    <!-- signup-only fields -->
    <div class="signup-extra" id="signup-extra" style="display:none">
      <div>
        <div class="lbl">اسم نمایشی</div>
        <input class="ifield" id="auth-name" placeholder="مثلاً: علی، سارا…" maxlength="20"/>
      </div>
      <div>
        <div class="lbl">آواتار</div>
        <div class="av-row" id="av-row"></div>
      </div>
    </div>

    <div>
      <div class="lbl">ایمیل</div>
      <input class="ifield" id="auth-email" type="email" placeholder="example@email.com" autocomplete="email"/>
    </div>
    <div>
      <div class="lbl">پسورد</div>
      <input class="ifield" id="auth-pass" type="password" placeholder="حداقل ۶ کاراکتر" autocomplete="current-password"/>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <button class="auth-btn" id="auth-btn" onclick="doAuth()">
      <span id="auth-btn-txt">ورود</span>
    </button>
  </div>
</div>

<!-- HEADER -->
<header id="header" style="display:none">
  <div class="hl">
    <div class="hav" id="hav"></div>
    <div>
      <div class="hname" id="hname"></div>
      <div class="hstatus" id="hstatus">متصل ✓</div>
    </div>
  </div>
  <div class="hr">
    <button class="icon-btn" onclick="openThemePanel()" title="شخصی‌سازی تم">🎨</button>
    <button class="icon-btn" onclick="signOut()" title="خروج از حساب">🚪</button>
  </div>
</header>

<!-- VOICE BAR -->
<div id="voice-bar" style="display:none">
  <div class="vb-left">
    <div>
      <div class="vb-title">🔊 روم صوتی</div>
      <div class="vb-members" id="vb-members"><span class="vb-empty">کسی اینجا نیست</span></div>
    </div>
  </div>
  <div class="vb-controls" id="vb-controls" style="display:none">
    <button class="vc-btn" id="mute-btn" onclick="toggleMute()" title="میکروفون">🎤</button>
  </div>
  <button class="vb-join-btn" id="vb-join-btn" onclick="toggleVoiceRoom()">ورود به صدا</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div id="messages">
    <div class="empty" id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-txt">اولین پیام رو بفرست!</div>
    </div>
  </div>
  <div id="typing"></div>
  <div id="input-bar">
    <div class="estrip" id="estrip"></div>
    <div class="irow">
      <textarea id="msg-input" rows="1" placeholder="پیام بنویس…"></textarea>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
</div>

<!-- THEME PANEL -->
<div id="theme-overlay" onclick="if(event.target===this) closeThemePanel()">
  <div id="theme-panel">
    <div class="tp-header">
      <div class="tp-title">🎨 شخصی‌سازی تم</div>
      <button class="icon-btn" onclick="closeThemePanel()">✕</button>
    </div>
    <div class="tp-body">
      <div>
        <div class="tp-section-title">پیش‌فرض‌ها</div>
        <div class="tp-presets" id="tp-presets"></div>
      </div>

      <div>
        <div class="tp-section-title">رنگ‌های اصلی</div>
        <div id="tp-main-colors"></div>
      </div>

      <div>
        <div class="tp-section-title">حباب پیام‌ها</div>
        <div id="tp-bubble-colors"></div>
      </div>

      <div>
        <div class="tp-section-title">گردی گوشه‌ها</div>
        <div class="tp-radius-row">
          <span style="font-size:13px">🔲</span>
          <input type="range" id="tp-radius" min="4" max="28" value="16" oninput="updateRadius(this.value)"/>
          <span style="font-size:13px">⬜</span>
          <span id="tp-radius-val" style="font-size:12px;color:var(--muted);min-width:32px;text-align:left">16px</span>
        </div>
      </div>

      <div class="tp-actions">
        <button class="tp-action-btn" onclick="resetTheme()">بازنشانی</button>
        <button class="tp-action-btn primary" onclick="closeThemePanel()">ذخیره و بستن</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
