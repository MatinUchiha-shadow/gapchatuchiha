<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GapChat</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0b0d12; --surface:#13161f; --panel:#1a1e2a; --border:#252a3a;
  --accent:#7c6dfa; --accent2:#fa6d9b; --teal:#2dd4bf; --green:#22c55e;
  --text:#e2e5f0; --muted:#6b7094; --red:#e5334a;
  --bubble-mine:#7c6dfa; --bubble-mine-text:#ffffff;
  --bubble-other:#13161f; --bubble-other-text:#e2e5f0;
  --font:'Vazirmatn',system-ui,sans-serif; --ease:.18s cubic-bezier(.4,0,.2,1);
  --radius:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background var(--ease),color var(--ease)}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh;height:calc(var(--app-vh, 100vh))}

/* ── AUTH SCREEN ── */
#auth-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;padding:24px;overflow-y:auto;
}
.auth-logo{
  width:76px;height:76px;border-radius:24px;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--teal),var(--accent));
  background-size:300% 300%;
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 8px 32px rgba(124,109,250,.4);flex-shrink:0;
  animation:logoGradient 6s ease infinite, logoFloat 3.5s ease-in-out infinite, logoIn .6s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.auth-logo::after{
  content:'';position:absolute;inset:-6px;border-radius:28px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  opacity:.35;filter:blur(14px);z-index:-1;
  animation:logoGlow 3.5s ease-in-out infinite;
}
.auth-logo span{display:inline-block;animation:logoBounce 2.6s ease-in-out infinite}
@keyframes logoGradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(-3deg)}}
@keyframes logoGlow{0%,100%{opacity:.25;transform:scale(.95)}50%{opacity:.5;transform:scale(1.08)}}
@keyframes logoIn{from{opacity:0;transform:scale(.4) rotate(-25deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes logoBounce{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-3px) scale(1.05)}50%{transform:translateY(0) scale(1)}75%{transform:translateY(1px) scale(.97)}}
.auth-title{font-size:26px;font-weight:700;animation:fadeSlideUp .6s cubic-bezier(.16,1,.3,1) .1s both}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;animation:fadeSlideUp .6s cubic-bezier(.16,1,.3,1) .2s both;box-shadow:0 20px 60px -20px rgba(0,0,0,.4)}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.auth-tabs{display:flex;background:var(--panel);border-radius:12px;padding:3px;gap:3px;position:relative}
.auth-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);transition:color var(--ease);text-align:center;position:relative;z-index:1}
.auth-tab.active{color:var(--text)}
.auth-tab.active::before{
  content:'';position:absolute;inset:0;background:var(--surface);border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:-1;
  animation:tabPop .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes tabPop{from{transform:scale(.85);opacity:.4}to{transform:scale(1);opacity:1}}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.ifield{padding:12px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;font-size:14px;width:100%;transition:border-color var(--ease);color:var(--text)}
.ifield:focus{border-color:var(--accent)}
.ifield.err{border-color:var(--red)}
.auth-btn{padding:13px;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow var(--ease),filter var(--ease);box-shadow:0 4px 16px rgba(124,109,250,.3);position:relative;overflow:hidden}
.auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,109,250,.4)}
.auth-btn:active{transform:translateY(0) scale(.98)}
.auth-btn:disabled{opacity:.6;pointer-events:none}
.auth-err{font-size:12px;color:var(--red);text-align:center;min-height:16px}
.auth-err:not(:empty){animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}

/* avatar picker (signup) */
.av-row{display:flex;gap:8px;flex-wrap:wrap;max-height:160px;overflow-y:auto;padding:2px}
.av-opt{width:42px;height:42px;border-radius:11px;font-size:20px;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),border-color var(--ease),background var(--ease)}
.av-opt:hover{border-color:var(--accent);transform:scale(1.1) rotate(-4deg)}
.av-opt:active{transform:scale(.92)}
.av-opt.sel{border-color:var(--accent);background:rgba(124,109,250,.15);transform:scale(1.08);animation:avSel .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes avSel{0%{transform:scale(.85)}60%{transform:scale(1.18)}100%{transform:scale(1.08)}}
.signup-extra{display:flex;flex-direction:column;gap:14px;animation:fadeSlideUp .35s cubic-bezier(.16,1,.3,1) both}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;animation:fadeSlideDown .4s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hl{display:flex;align-items:center;gap:10px}
.hav{width:36px;height:36px;border-radius:11px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--panel);color:var(--text);flex-shrink:0}
.hname{font-size:14px;font-weight:600}
.hstatus{font-size:11px;color:var(--muted)}
.hr{display:flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--ease),transform .15s cubic-bezier(.34,1.56,.64,1)}
.icon-btn:hover{background:var(--border);transform:scale(1.08)}
.icon-btn:active{transform:scale(.92)}

/* ── VOICE BAR ── */
#voice-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;animation:fadeSlideDown .4s cubic-bezier(.16,1,.3,1) .05s both}
.vb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vb-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.vb-members{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.vm-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--panel);border:1px solid var(--border);font-size:12px;transition:all .25s cubic-bezier(.34,1.56,.64,1);animation:chipIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes chipIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.vm-chip.speaking{border-color:var(--green);background:rgba(34,197,94,.1);box-shadow:0 0 0 2px rgba(34,197,94,.15);animation:speakPulse 1.2s ease-in-out infinite}
@keyframes speakPulse{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.15)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.25)}}
.vm-av{font-size:13px;width:18px;height:18px;border-radius:5px;background:var(--panel);color:var(--text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vm-name{color:var(--text);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.vm-mute{font-size:10px;opacity:.6}
.vb-empty{font-size:12px;color:var(--muted);font-style:italic}
.vb-controls{display:flex;gap:6px}
.vc-btn{width:30px;height:30px;border-radius:8px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);transition:all var(--ease)}
.vc-btn.muted{background:rgba(250,109,155,.1);border-color:var(--accent2)}
.vb-join-btn{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);transition:transform .15s cubic-bezier(.34,1.56,.64,1),background var(--ease);white-space:nowrap}
.vb-join-btn:hover{background:rgba(34,197,94,.22);transform:scale(1.04)}
.vb-join-btn:active{transform:scale(.96)}
.vb-join-btn.leave{background:rgba(229,51,74,.1);color:var(--red);border-color:rgba(229,51,74,.25)}
.vb-join-btn.leave:hover{background:rgba(229,51,74,.2)}

/* ── MESSAGES ── */
#messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex;gap:6px;align-items:flex-end;animation:mi .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes mi{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.mine{flex-direction:row-reverse;animation:miMine .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes miMine{from{opacity:0;transform:translateY(14px) scale(.96) }to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.gtop{margin-top:10px}
.mav{width:26px;height:26px;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--panel);color:var(--text);animation:avPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes avPop{from{opacity:0;transform:scale(.5) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.mav-ph{width:26px;flex-shrink:0}
.bwrap{display:flex;flex-direction:column;max-width:70%}
.msg-row.mine .bwrap{align-items:flex-end}
.sname{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 3px}
.bubble{padding:9px 13px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-break:break-word;transition:transform .15s ease,box-shadow .15s ease}
.bubble:active{transform:scale(.985)}
.bubble img.chat-media{max-width:220px;max-height:200px;border-radius:10px;display:block;cursor:pointer;margin-top:4px}
.bubble video.chat-media{max-width:220px;max-height:200px;border-radius:10px;display:block;margin-top:4px}

/* ── منشن ── */
.mention{color:var(--accent);font-weight:600;cursor:pointer;background:rgba(124,109,250,.12);border-radius:5px;padding:0 3px}
.mention:hover{background:rgba(124,109,250,.25)}
.mention.mine{color:#c4bbff;background:rgba(255,255,255,.15)}

/* ── پین ── */
#pinned-bar{background:rgba(124,109,250,.08);border-bottom:1px solid rgba(124,109,250,.2);padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;animation:fadeSlideDown .3s ease}
#pinned-bar:hover{background:rgba(124,109,250,.15)}
.pinned-icon{font-size:14px;flex-shrink:0}
.pinned-text{font-size:12px;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pinned-by{font-size:10px;color:var(--muted);flex-shrink:0}

/* ── ری‌اکشن ── */
.reactions-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.reaction-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;background:var(--panel);border:1.5px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s cubic-bezier(.34,1.56,.64,1);user-select:none}
.reaction-chip:hover{transform:scale(1.1);border-color:var(--accent)}
.reaction-chip.mine{background:rgba(124,109,250,.15);border-color:var(--accent)}
.reaction-chip .rc{font-size:14px}
.reaction-chip .cnt{font-size:11px;font-weight:700;color:var(--muted)}

/* ── ری‌اکشن پیکر ── */
#reaction-picker{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px;display:flex;gap:6px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.4);animation:fadeSlideUp .2s ease}
.rp-emoji{width:34px;height:34px;border-radius:9px;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--panel);transition:transform .15s cubic-bezier(.34,1.56,.64,1),background var(--ease)}
.rp-emoji:hover{transform:scale(1.2);background:var(--border)}

/* ── ریپلای ── */
.reply-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(124,109,250,.06);border-top:1px solid rgba(124,109,250,.15);flex-shrink:0;animation:fadeSlideUp .2s ease}
.reply-bar-content{flex:1;min-width:0}
.reply-bar-name{font-size:11px;color:var(--accent);font-weight:600}
.reply-bar-text{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-preview{border-right:3px solid var(--accent);padding:5px 10px;margin-bottom:5px;border-radius:0 8px 8px 0;background:rgba(124,109,250,.06);font-size:12px;cursor:pointer}
.reply-preview .rp-name{color:var(--accent);font-weight:600;font-size:11px;margin-bottom:2px}
.reply-preview .rp-text{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── منوی پیام ── */
.msg-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:6px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.45);min-width:160px;animation:fadeSlideUp .2s ease}
.msg-menu-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:9px;font-size:13px;width:100%;text-align:right;transition:background .12s;color:var(--text)}
.msg-menu-item:hover{background:var(--panel)}
.msg-menu-item.danger{color:var(--red)}
.msg-menu-sep{height:1px;background:var(--border);margin:4px 0}

/* ── لول ── */
.level-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-top:4px}
.lvl-bar-wrap{width:100%;height:6px;background:var(--border);border-radius:99px;margin-top:6px;overflow:hidden}
.lvl-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s cubic-bezier(.16,1,.3,1)}

/* ── میوت کاربر ── */
.muted-msg{opacity:.35;filter:grayscale(.6);pointer-events:none}
.msg-row:not(.mine) .bubble{background:var(--bubble-other);color:var(--bubble-other-text);border:1px solid var(--border);border-bottom-right-radius:5px}
.msg-row.mine .bubble{background:var(--bubble-mine);color:var(--bubble-mine-text);border-bottom-left-radius:5px}
.bubble.sys{background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center;padding:5px 12px;border-radius:99px}
.msg-row.mine .bubble.sys{color:var(--muted);border-color:var(--border)}
.bmeta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px}
.msg-row.mine .bmeta{text-align:left}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4}
.empty-icon{font-size:44px;animation:emptyFloat 3s ease-in-out infinite}
@keyframes emptyFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(8deg)}}
.empty-txt{font-size:13px;color:var(--muted)}

/* ── INPUT ── */
#typing{min-height:20px;padding:2px 14px 4px;font-size:12px;color:var(--muted)}
#input-bar{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.estrip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.estrip::-webkit-scrollbar{height:0}
.eq{width:30px;height:30px;border-radius:8px;font-size:16px;flex-shrink:0;background:var(--panel);display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background var(--ease)}
.eq:hover{background:var(--border);transform:scale(1.18) rotate(-6deg)}
.eq:active{transform:scale(.9)}
.irow{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;padding:10px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;font-size:14px;resize:none;max-height:110px;line-height:1.55;transition:border-color var(--ease)}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:var(--accent);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow var(--ease);box-shadow:0 3px 12px rgba(124,109,250,.3)}
#send-btn:hover{transform:scale(1.08) rotate(-8deg)}
#send-btn:active{transform:scale(.9) rotate(0deg)}
#send-btn.sent{animation:sendPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes sendPop{0%{transform:scale(.85) rotate(0)}50%{transform:scale(1.15) rotate(-15deg)}100%{transform:scale(1) rotate(0)}}

/* ── انیمیشن‌های کد مخفی ── */
@keyframes confettiFall{
  0%{top:-20px;opacity:1;transform:rotate(0deg) scale(1)}
  80%{opacity:1}
  100%{top:110vh;opacity:0;transform:rotate(720deg) scale(0.5) translateX(100px)}
}
@keyframes bigEmojiPop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
  70%{transform:translate(-50%,-50%) scale(0.95)}
  85%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}
@keyframes advancementSlide{
  from{transform:translateY(-50%) translateX(120px);opacity:0}
  to{transform:translateY(-50%) translateX(0);opacity:1}
}
@keyframes advancementSlideOut{
  from{transform:translateY(-50%) translateX(0);opacity:1}
  to{transform:translateY(-50%) translateX(120px);opacity:0}
}


#theme-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:none;align-items:flex-end;justify-content:center;transition:background .25s ease}
#theme-overlay.show{display:flex;background:rgba(0,0,0,.5)}
#theme-panel{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.4,1)}
#theme-overlay.show #theme-panel{transform:translateY(0)}
.tp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.tp-title{font-size:16px;font-weight:700}
.tp-body{overflow-y:auto;padding:14px 18px 24px;display:flex;flex-direction:column;gap:18px}
.tp-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.tp-presets{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.tp-presets::-webkit-scrollbar{height:0}
.preset-chip{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:14px;border:1.5px solid var(--border);background:var(--panel);transition:all var(--ease)}
.preset-chip.active{border-color:var(--accent)}
.preset-swatch{width:40px;height:40px;border-radius:10px;display:flex;overflow:hidden}
.preset-swatch span{flex:1;height:100%}
.preset-label{font-size:10px;color:var(--muted)}
.color-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.color-row:last-child{border-bottom:none}
.color-row-info{display:flex;flex-direction:column;gap:2px}
.color-name{font-size:13px;font-weight:600}
.color-desc{font-size:11px;color:var(--muted)}
.color-input-wrap{position:relative;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);overflow:hidden;flex-shrink:0}
.color-input-wrap input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);cursor:pointer;border:none;padding:0}
.tp-actions{display:flex;gap:8px;padding-top:6px}
.tp-action-btn{flex:1;padding:11px;border-radius:12px;font-size:13px;font-weight:600;background:var(--panel);border:1px solid var(--border);transition:all var(--ease)}
.tp-action-btn:hover{background:var(--border)}
.tp-action-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.tp-radius-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.tp-radius-row input[type=range]{flex:1;accent-color:var(--accent)}

/* ── PROFILE MODAL ── */
#profile-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:210;display:none;align-items:center;justify-content:center;padding:20px;transition:background .25s ease}
#profile-overlay.show{display:flex;background:rgba(0,0,0,.55)}
#profile-card{background:var(--surface);border-radius:24px;width:100%;max-width:360px;max-height:88vh;overflow-y:auto;transform:scale(.9) translateY(20px);opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .25s ease}
#profile-overlay.show #profile-card{transform:scale(1) translateY(0);opacity:1}
.pf-header{position:relative;height:90px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:24px 24px 0 0;flex-shrink:0}
.pf-close{position:absolute;top:10px;left:10px;width:32px;height:32px;border-radius:10px;background:rgba(0,0,0,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--ease)}
.pf-close:hover{background:rgba(0,0,0,.4)}
.pf-avatar-wrap{position:relative;width:84px;height:84px;border-radius:24px;margin:-42px auto 0;border:4px solid var(--surface);background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden;animation:pfAvatarIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pfAvatarIn{from{opacity:0;transform:scale(.6) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pf-avatar-wrap img{width:100%;height:100%;object-fit:cover}
.pf-upload-btn{position:absolute;bottom:-2px;left:-2px;width:28px;height:28px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid var(--surface);transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.pf-upload-btn:hover{transform:scale(1.1)}
.pf-upload-btn:active{transform:scale(.9)}
.pf-upload-btn input{display:none}
.pf-body{padding:14px 20px 22px;display:flex;flex-direction:column;align-items:center;gap:4px}
.pf-name{font-size:18px;font-weight:700;display:flex;align-items:center;gap:6px}
.pf-email{font-size:12px;color:var(--muted)}
.pf-role-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-top:6px;animation:badgeIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgeIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.pf-role-badge.member{background:var(--panel);color:var(--muted)}
.pf-role-badge.helper{background:rgba(45,212,191,.15);color:var(--teal)}
.pf-role-badge.admin{background:rgba(250,109,155,.15);color:var(--accent2)}
.pf-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:16px}
.pf-stat{background:var(--panel);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:4px;align-items:center;animation:fadeSlideUp .35s cubic-bezier(.16,1,.3,1) both}
.pf-stat:nth-child(2){animation-delay:.05s}
.pf-stat:nth-child(3){animation-delay:.1s}
.pf-stat:nth-child(4){animation-delay:.15s}
.pf-stat-val{font-size:18px;font-weight:700}
.pf-stat-lbl{font-size:11px;color:var(--muted)}
.pf-banned{margin-top:12px;padding:8px 14px;border-radius:12px;background:rgba(229,51,74,.12);color:var(--red);font-size:12px;font-weight:600;width:100%;text-align:center}
.pf-admin-actions{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.pf-admin-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.pf-role-row{display:flex;gap:6px}
.pf-role-btn{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:600;background:var(--panel);border:1.5px solid var(--border);transition:all var(--ease)}
.pf-role-btn.active{border-color:var(--accent);background:rgba(124,109,250,.12)}
.pf-role-btn:hover{border-color:var(--accent)}
.pf-action-row{display:flex;gap:8px}
.pf-action-btn{flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--panel);transition:all var(--ease)}
.pf-action-btn.danger{color:var(--red);border-color:rgba(229,51,74,.3)}
.pf-action-btn.danger:hover{background:rgba(229,51,74,.1)}
.pf-action-btn.ok{color:var(--green);border-color:rgba(34,197,94,.3)}
.pf-action-btn.ok:hover{background:rgba(34,197,94,.1)}
.pf-loading{padding:30px;text-align:center;color:var(--muted);font-size:13px}

/* clickable name/avatar */
.sname.clickable,.mav.clickable{cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.mav.clickable:hover{transform:scale(1.12)}
.sname.clickable:hover{color:var(--accent)}
.hav.clickable{cursor:pointer}
.hav.clickable:hover{transform:scale(1.06)}
.hav img,.mav img{width:100%;height:100%;object-fit:cover;border-radius:inherit}

/* ── VOICE ROOMS / DM MODALS (generic full panel) ── */
.fp-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:205;display:none;align-items:flex-end;justify-content:center;transition:background .25s ease}
.fp-overlay.show{display:flex;background:rgba(0,0,0,.5)}
.fp-panel{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;height:80vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.4,1)}
.fp-overlay.show .fp-panel{transform:translateY(0)}
.fp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.fp-title{font-size:16px;font-weight:700;flex-shrink:0}
.fp-search{flex:1;padding:9px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;font-size:13px}
.fp-search:focus{border-color:var(--accent)}
.fp-body{flex:1;overflow-y:auto;padding:14px 18px}
.fp-create-btn{padding:9px 14px;border-radius:12px;font-size:13px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;white-space:nowrap;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.fp-create-btn:hover{transform:scale(1.05)}
.fp-create-btn:active{transform:scale(.95)}

/* room cards */
.room-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:16px;background:var(--panel);border:1px solid var(--border);margin-bottom:10px;transition:transform .15s cubic-bezier(.34,1.56,.64,1),border-color var(--ease);cursor:pointer;animation:fadeSlideUp .3s cubic-bezier(.16,1,.3,1) both}
.room-card:hover{transform:scale(1.01);border-color:var(--accent)}
.room-card:active{transform:scale(.99)}
.room-card.current{border-color:var(--accent);background:rgba(124,109,250,.08)}
.room-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.room-info{flex:1;min-width:0}
.room-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.room-meta{font-size:12px;color:var(--muted);margin-top:2px}
.room-lock{font-size:13px}
.room-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* create room form */
.create-room-form{display:flex;flex-direction:column;gap:12px;padding:6px 0 16px}
.create-room-form .lbl{margin-bottom:0}

/* DM list */
.dm-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;transition:background var(--ease);cursor:pointer;animation:fadeSlideUp .3s cubic-bezier(.16,1,.3,1) both}
.dm-item:hover{background:var(--panel)}
.dm-item-av{width:42px;height:42px;border-radius:12px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.dm-item-av img{width:100%;height:100%;object-fit:cover}
.dm-item-info{flex:1;min-width:0}
.dm-item-name{font-size:13px;font-weight:600}
.dm-item-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-item-time{font-size:10px;color:var(--muted);flex-shrink:0}

/* DM chat view */
#dm-chat-overlay .fp-panel{height:90vh}
.dm-chat-header{display:flex;align-items:center;gap:10px;flex:1}
.dm-chat-av{width:34px;height:34px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.dm-chat-av img{width:100%;height:100%;object-fit:cover}
.dm-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:3px}
.dm-input-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.dm-input{flex:1;padding:10px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;font-size:14px}
.dm-input:focus{border-color:var(--accent)}
.dm-send-btn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:var(--accent);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.dm-send-btn:hover{transform:scale(1.08) rotate(-8deg)}
.dm-send-btn:active{transform:scale(.9)}
.dm-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:.4}

/* ── MISC ── */
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px) scale(.9);background:var(--panel);border:1px solid var(--border);padding:9px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:99;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
#err-bar{display:none;background:var(--red);color:#fff;font-size:12px;text-align:center;padding:7px}
@media(max-width:480px){.bwrap{max-width:82%}}
</style>
</head>
<body data-theme="dark">
<div id="app">

<!-- AUTH -->

<script>

let currentTheme = {};
function loadTheme(){
  const saved=localStorage.getItem('gapchat_theme');
  if(saved){ try{ currentTheme=JSON.parse(saved); }catch{ currentTheme={...THEME_PRESETS['پیش‌فرض']}; } }
  else currentTheme={...THEME_PRESETS['پیش‌فرض']};
  applyTheme();
}
function applyTheme(){
  const root=document.documentElement;
  Object.entries(currentTheme).forEach(([k,v])=>root.style.setProperty(k,v));
}
function saveTheme(){ localStorage.setItem('gapchat_theme',JSON.stringify(currentTheme)); }
function setThemeVar(key,val){ currentTheme[key]=val; applyTheme(); saveTheme(); renderThemePanel(); }
function updateRadius(val){ currentTheme['--radius']=val+'px'; document.getElementById('tp-radius-val').textContent=val+'px'; applyTheme(); saveTheme(); }
function applyPreset(name){ currentTheme={...THEME_PRESETS[name]}; if(!currentTheme['--radius']) currentTheme['--radius']='16px'; applyTheme(); saveTheme(); renderThemePanel(); }
function resetTheme(){ applyPreset('پیش‌فرض'); toast('تم بازنشانی شد'); }

function renderThemePanel(){
  /* presets */
  const presetsEl=document.getElementById('tp-presets');
  presetsEl.innerHTML='';
  Object.entries(THEME_PRESETS).forEach(([name,vars])=>{
    const isActive=JSON.stringify(vars)===JSON.stringify({...vars,...Object.fromEntries(Object.entries(currentTheme).filter(([k])=>k in vars))}) && currentTheme['--accent']===vars['--accent'] && currentTheme['--bg']===vars['--bg'];
    const chip=document.createElement('button');
    chip.className='preset-chip'+(isActive?' active':'');
    chip.onclick=()=>applyPreset(name);
    chip.innerHTML=`<div class="preset-swatch">
        <span style="background:${vars['--bg']}"></span>
        <span style="background:${vars['--accent']}"></span>
        <span style="background:${vars['--accent2']}"></span>
      </div>
      <div class="preset-label">${name}</div>`;
    presetsEl.appendChild(chip);
  });

  /* color rows */
  const mainEl=document.getElementById('tp-main-colors');
  const bubbleEl=document.getElementById('tp-bubble-colors');
  mainEl.innerHTML=''; bubbleEl.innerHTML='';
  THEME_VARS.forEach(v=>{
    const target = v.group==='main'?mainEl:bubbleEl;
    const row=document.createElement('div');
    row.className='color-row';
    const val=currentTheme[v.key]||'#000000';
    row.innerHTML=`
      <div class="color-row-info">
        <div class="color-name">${v.name}</div>
        <div class="color-desc">${v.desc}</div>
      </div>
      <div class="color-input-wrap" style="background:${val}">
        <input type="color" value="${toHex(val)}" oninput="setThemeVar('${v.key}',this.value)"/>
      </div>`;
    target.appendChild(row);
  });

  /* radius */
  const radiusVal=parseInt(currentTheme['--radius'])||16;
  document.getElementById('tp-radius').value=radiusVal;
  document.getElementById('tp-radius-val').textContent=radiusVal+'px';
}

function toHex(c){
  if(c.startsWith('#')&&(c.length===7||c.length===4)) return c.length===4? '#'+[...c.slice(1)].map(x=>x+x).join('') : c;
  /* fallback for non-hex values */
  const ctx=document.createElement('canvas').getContext('2d');
  ctx.fillStyle=c;
  return ctx.fillStyle;
}

/* ══ AUTH ACTION ══ */
window.doAuth=async function(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const dispName=document.getElementById('auth-name').value.trim();
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email||!pass){ errEl.textContent='ایمیل و پسورد رو پر کن'; return; }
  if(pass.length<6){ errEl.textContent='پسورد باید حداقل ۶ کاراکتر باشه'; return; }
  if(authMode==='signup'&&!dispName){ errEl.textContent='یه اسم نمایشی وارد کن'; return; }

  const btn=document.getElementById('auth-btn');
  btn.disabled=true;
  document.getElementById('auth-btn-txt').innerHTML='<span class="spin">⏳</span>';

  const endpoint = authMode==='login'
    ? '/auth/v1/token?grant_type=password'
    : '/auth/v1/signup';
  try{
    const body = authMode==='signup'
      ? {email,password:pass,data:{display_name:dispName,avatar:selectedAv}}
      : {email,password:pass};
    const res=await fetch(SB_URL+endpoint,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    if(!res.ok){
      const msg=data.error_description||data.msg||data.error||'خطا';
      errEl.textContent=translateAuthErr(msg);
      btn.disabled=false; document.getElementById('auth-btn-txt').textContent=authMode==='login'?'ورود':'ثبت‌نام';
      return;
    }
    if(authMode==='signup'&&!data.access_token){
      errEl.textContent='';
      toast('ثبت‌نام انجام شد! حالا وارد شو ✓');
      switchTab('login'); btn.disabled=false; document.getElementById('auth-btn-txt').textContent='ورود';
      return;
    }
    localStorage.setItem('sb_session',JSON.stringify(data));
    restoreSession(data);
  }catch(e){
    errEl.textContent='مشکل اتصال به سرور';
    btn.disabled=false; document.getElementById('auth-btn-txt').textContent=authMode==='login'?'ورود':'ثبت‌نام';
  }
};

function translateAuthErr(msg){
  if(msg.includes('Invalid login')) return 'ایمیل یا پسورد اشتباهه';
  if(msg.includes('Email not confirmed')) return 'ایمیلت رو تأیید کن';
  if(msg.includes('already registered')) return 'این ایمیل قبلاً ثبت شده';
  if(msg.includes('password')) return 'پسورد خیلی ضعیفه';
  return msg;
}

function restoreSession(data){
  authToken=data.access_token;
  myEmail=data.user?.email||'';
  const meta=data.user?.user_metadata||{};
  myName=meta.display_name||myEmail.split('@')[0];
  myAv=meta.avatar||AVATARS[0];
  isAdmin=myEmail.toLowerCase()===ADMIN_EMAIL.toLowerCase();
  /* ذخیره refresh token برای تجدید session */
  if(data.refresh_token) localStorage.setItem('sb_refresh_token', data.refresh_token);
  scheduleTokenRefresh(data);
  enterChat();
}

/* تجدید خودکار توکن قبل از انقضا */
function scheduleTokenRefresh(data){
  const expiresIn = (data.expires_in||3600) - 120; // ۲ دقیقه قبل
  clearTimeout(window._tokenRefreshTimer);
  window._tokenRefreshTimer = setTimeout(refreshToken, Math.max(expiresIn, 30) * 1000);
}

async function refreshToken(){
  const rt = localStorage.getItem('sb_refresh_token');
  if(!rt) return;
  try{
    const res = await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:rt})
    });
    if(res.ok){
      const data = await res.json();
      if(data.access_token){
        authToken = data.access_token;
        localStorage.setItem('sb_session', JSON.stringify(data));
        if(data.refresh_token) localStorage.setItem('sb_refresh_token', data.refresh_token);
        scheduleTokenRefresh(data);
      }
    }
  }catch{}
}

/* چک role ادمین از database */
async function checkAdminRole(){
  if(myEmail.toLowerCase()===ADMIN_EMAIL.toLowerCase()){
    isAdmin=true;
    applyAdminUI();
    return;
  }
  try{
    const rows=await api(`/rest/v1/profiles?name=eq.${encodeURIComponent(myName)}&select=role`);
    if(rows&&rows[0]&&rows[0].role==='admin'){
      isAdmin=true;
      applyAdminUI();
    } else if(rows&&rows[0]&&rows[0].role!=='admin'){
      /* اگه role برداشته شد */
      if(myEmail.toLowerCase()!==ADMIN_EMAIL.toLowerCase()){
        isAdmin=false;
        document.getElementById('hname').textContent=myName;
        document.getElementById('msg-input').placeholder='پیام بنویس…';
      }
    }
  }catch{}
}

window.signOut=async function(){
  if(!confirm('از حساب خارج بشی؟')) return;
  if(inVoice) await leaveVoiceRoom();
  clearInterval(pollTimer);
  try{
    await fetch(SB_URL+'/auth/v1/logout',{
      method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+authToken}
    });
  }catch{}
  localStorage.removeItem('sb_session');
  location.reload();
};

/* ══ API ══ */
async function api(path, opts={}){
  const headers={
    'apikey':SB_KEY,
    'Authorization':'Bearer '+(authToken||SB_KEY),
    'Content-Type':'application/json',
    'Prefer':'return=representation',
    ...(opts.headers||{})
  };
  const res=await fetch(SB_URL+path,{...opts,headers});
  if(!res.ok) throw new Error(await res.text());
  const t=await res.text(); return t?JSON.parse(t):[];
}

/* ══ MESSAGES ══ */
const seenMsgIds = new Set();

async function loadMessages(){
  await cleanupOldMessages();
  try{
    const rows=await api('/rest/v1/messages?order=id.asc&select=*');
    if(rows.length){const em=document.getElementById('empty-state');if(em)em.remove();}
    rows.forEach(r=>{
      if(!seenMsgIds.has(r.id)){
        seenMsgIds.add(r.id);
        appendMsg(r);
        lastId=r.id;
      }
    });
    scrollBottom();
  }catch(e){showErr('خطا در بارگذاری');}
}

/* پاکسازی پشتیبان سمت کلاینت: پیام‌های قدیمی‌تر از ۶ ساعت رو حذف می‌کنه
   (علاوه بر pg_cron سمت سرور، اگه به هر دلیلی فعال نباشه) */
async function cleanupOldMessages(){
  try{
    await cleanupExpiredMedia();
    const cutoff=new Date(Date.now()-6*60*60*1000).toISOString();
    await api(`/rest/v1/messages?created_at=lt.${cutoff}`,{method:'DELETE',headers:{'Prefer':''}});
  }catch{}
}

function startPolling(){
  let pollCount=0;
  pollTimer=setInterval(async()=>{
    pollCount++;
    try{
      const rows=await api(`/rest/v1/messages?id=gt.${lastId}&order=id.asc&select=*`);
      if(rows.length){
        const em=document.getElementById('empty-state');if(em)em.remove();
        rows.forEach(r=>{
          if(!seenMsgIds.has(r.id)){
            seenMsgIds.add(r.id);
            appendMsg(r);
            lastId=r.id;
          }
        });
        scrollBottom();
      }
    }catch{}
    await pollSignals();
    /* هر ۳۰ ثانیه role رو دوباره چک کن */
    if(pollCount % 20 === 0) checkAdminRole();
  },1500);
}

window.sendMsg=async function(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text && !pendingMediaFile || !myName) return;

  /* ── دستورات مخفی (برای همه) ── */
  if(text==='/Morty' || text==='/KMG'){
    inp.value=''; inp.style.height='';

  }

  /* ── دستورات ادمین ── */
  if(isAdmin && text.startsWith('/')){

  if(banned){ toast('شما از چت بن شده‌اید 🚫'); return; }

let pendingMediaFile=null;
let pendingMediaIsVideo=false;

(()=>{
  const input=document.getElementById('media-input');

    if(!file) return;

    pendingMediaFile=file;

    const vid=document.getElementById('media-preview-vid');
    const url=URL.createObjectURL(file);
    if(pendingMediaIsVideo){
      vid.src=url; vid.style.display='block'; img.style.display='none';
    } else {
      img.src=url; img.style.display='block'; vid.style.display='none';

window.cancelMedia=function(){
  pendingMediaFile=null;
  document.getElementById('media-preview').style.display='none';
  document.getElementById('media-preview-img').src='';
  document.getElementById('media-preview-vid').src='';
};

async function sendMediaMessage(inp, caption){
  const file=pendingMediaFile;
  const isVideo=pendingMediaIsVideo;
  const bucket=isVideo?'chat-videos':'chat-images';
  const ext=(file.name.split('.').pop()||(isVideo?'mp4':'jpg')).toLowerCase().replace(/[^a-z0-9]/g,'');
  /* مسیر ساده بدون کاراکتر خاص */
  const path=`${Date.now()}.${ext||'jpg'}`;

  /* نمایش UI لودینگ */
  cancelMedia();
  inp.value=''; inp.style.height='';
  showUploadProgress(file.size, isVideo);

  try{
    await uploadWithProgress(
      `${SB_URL}/storage/v1/object/${bucket}/${path}`,
      {
        method:'POST',
        headers:{
          'apikey':SB_KEY,
          'Authorization':'Bearer '+(authToken||SB_KEY),
          'Content-Type':file.type,
          'x-upsert':'true'
        }
      },
      file,
      (pct)=>updateUploadProgress(pct)
    );

    hideUploadProgress();
    const publicUrl=`${SB_URL}/storage/v1/object/public/${bucket}/${path}`;
    const expiresAt=new Date(Date.now()+60*60*1000).toISOString();
    const msgText=`__MEDIA__${isVideo?'video':'image'}__${publicUrl}__${path}__${bucket}__EXPIRE__${expiresAt}__${caption?'CAP__'+caption:''}`;

    const sb=document.getElementById('send-btn');
    sb.classList.remove('sent'); void sb.offsetWidth; sb.classList.add('sent');
    const rows=await api('/rest/v1/messages',{method:'POST',body:JSON.stringify({name:myName,avatar:myAv,text:msgText})});
    if(rows&&rows.length){const em=document.getElementById('empty-state');if(em)em.remove();if(rows[0].id>lastId){appendMsg(rows[0]);lastId=rows[0].id;scrollBottom();}}
    api('/rest/v1/rpc/increment_message_count',{method:'POST',body:JSON.stringify({p_name:myName,p_email:myEmail,p_avatar:myAv})}).catch(()=>{});
    toast('✅ ارسال شد');
  }catch(err){
    hideUploadProgress();
    console.error('upload error',err);
    toast('❌ آپلود ناموفق بود: '+err.message);
  }
}

function uploadWithProgress(url, opts, file, onProgress){
  return new Promise((resolve, reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open(opts.method||'POST', url);
    Object.entries(opts.headers||{}).forEach(([k,v])=>xhr.setRequestHeader(k,v));
    xhr.upload.onprogress=e=>{
      if(e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100));
    };
    xhr.onload=()=>{
      if(xhr.status>=200&&xhr.status<300) resolve(xhr.responseText);
      else reject(new Error(`HTTP ${xhr.status}: ${xhr.responseText}`));
    };
    xhr.onerror=()=>reject(new Error('خطای شبکه'));
    xhr.send(file);
  });
}

function fmtSize(bytes){

  }

        <svg width="44" height="44" style="transform:rotate(-90deg)">
          <circle cx="22" cy="22" r="18" fill="none" stroke="var(--border)" stroke-width="4"/>
          <circle id="upl-circle" cx="22" cy="22" r="18" fill="none" stroke="var(--accent)" stroke-width="4"
            stroke-dasharray="113" stroke-dashoffset="113" stroke-linecap="round" style="transition:stroke-dashoffset .3s ease"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700" id="upl-pct">0%</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;margin-bottom:3px">${isVideo?'📹 در حال آپلود فیلم':'🖼 در حال آپلود عکس'}</div>
        <div style="font-size:11px;color:var(--muted)" id="upl-size">۰ / ${fmtSize(totalBytes)}</div>

    </div>`;

function updateUploadProgress(pct){
  const bar=document.getElementById('upl-bar');
  const circle=document.getElementById('upl-circle');
  const pctEl=document.getElementById('upl-pct');
  const sizeEl=document.getElementById('upl-size');
  const el=document.getElementById('upload-progress-bar');
  if(!bar) return;
  bar.style.width=pct+'%';
  if(circle) circle.style.strokeDashoffset=(113*(1-pct/100)).toFixed(1);
  if(pctEl) pctEl.textContent=pct+'%';
  if(sizeEl&&el&&el._total) sizeEl.textContent=fmtSize(el._total*pct/100)+' / '+fmtSize(el._total);
}

  const el=document.getElementById('upload-progress-bar');
  if(el){ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }
}

/* پاکسازی فایل‌های منقضی‌شده از storage */
async function cleanupExpiredMedia(){
  try{
    const cutoff=new Date(Date.now()-60*60*1000).toISOString();
    /* پیدا کردن پیام‌های مدیای قدیمی */
    const rows=await api(`/rest/v1/messages?created_at=lt.${cutoff}&select=id,text`);
    for(const r of rows){
      if(!r.text||!r.text.startsWith('__MEDIA__')) continue;
      /* استخراج bucket و path */
      const m=r.text.match(/__MEDIA__(?:image|video)__[^_]+__([^_]+)__([^_]+)__EXPIRE__/);
      if(!m) continue;
      const filePath=m[1], bucket=m[2];
      /* حذف از storage */
      fetch(`${SB_URL}/storage/v1/object/${bucket}/${filePath}`,{
        method:'DELETE',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+(authToken||SB_KEY)}
      }).catch(()=>{});
    }
  }catch{}
}

        await api(`/rest/v1/banned_users?name=eq.${encodeURIComponent(arg)}`,{method:'DELETE',headers:{'Prefer':''}});
        toast(`✅ ${arg} از بن خارج شد`);

        toast('فرمت: /role نام member|helper|admin'); break;

        await setUserRole(targetName, role);
        toast(`✅ رول ${targetName} شد: ${role}`);

      break;
    }
    case '/profile': {
      if(!arg){ toast('فرمت: /profile نام_کاربر'); break; }
      openProfile(arg);
      break;
    }
    case '/delroom': {
      const roomId=parseInt(arg);
      if(!arg||isNaN(roomId)){ toast('فرمت: /delroom شناسه_روم'); break; }
      if(roomId===0){ toast('❌ روم عمومی رو نمیشه حذف کرد'); break; }

        await api(`/rest/v1/voice_rooms?id=eq.${roomId}`,{method:'DELETE',headers:{'Prefer':''}});

        if(currentRoomId===roomId) await switchVoiceRoom(0,'روم عمومی',false);
      }catch{ toast('❌ خطا در حذف روم'); }
      break;
    }
    case '/help': {
      showAdminHelpMenu();
      break;
    }
    default:

  }
}

function fmtDuration(totalSeconds){
  totalSeconds=totalSeconds||0;
  const h=Math.floor(totalSeconds/3600);
  const m=Math.floor((totalSeconds%3600)/60);
  if(h>0) return `${h} ساعت ${m} دقیقه`;
  if(m>0) return `${m} دقیقه`;
  return `${totalSeconds} ثانیه`;
}

function fmtLastSeen(iso){
  if(!iso) return '—';
  const d=new Date(iso);
  const diffMin=Math.floor((Date.now()-d.getTime())/60000);
  if(diffMin<1) return 'هم‌اکنون';
  if(diffMin<60) return `${diffMin} دقیقه پیش`;
  const diffH=Math.floor(diffMin/60);
  if(diffH<24) return `${diffH} ساعت پیش`;
  const diffD=Math.floor(diffH/24);
  return `${diffD} روز پیش`;
}

window.saveDisplayName=async function(){
  const inp=document.getElementById('pf-name-input');
  const newName=inp.value.trim();
  if(!newName){ toast('اسم نمی‌تونه خالی باشه'); return; }
  if(newName===myName){ toggleNameEdit(); return; }
  if(newName.length>20){ toast('حداکثر ۲۰ کاراکتر'); return; }

  /* چک تکراری بودن اسم */
  try{
    const existing=await api(`/rest/v1/profiles?name=eq.${encodeURIComponent(newName)}&select=name`);
    if(existing.length>0){ toast('❌ این اسم قبلاً توسط کاربر دیگه‌ای انتخاب شده'); return; }
  }catch{}

  const oldName=myName;
  try{
    /* آپدیت متادیتای Auth */
    const res=await fetch(SB_URL+'/auth/v1/user',{
      method:'PUT',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+authToken,'Content-Type':'application/json'},
      body:JSON.stringify({data:{display_name:newName,avatar:myAv}})
    });
    if(!res.ok) throw new Error(await res.text());

    /* migrate پروفایل/آمار با rename */
    await api('/rest/v1/rpc/rename_profile',{method:'POST',body:JSON.stringify({old_name:oldName,new_name:newName})}).catch(()=>{});

    myName=newName;
    document.getElementById('hname').textContent=myName+(isAdmin?' 👑':'');
    document.querySelectorAll('.mav.clickable, .sname.clickable').forEach(el=>{
      if(el.getAttribute('onclick')===`openProfile('${oldName.replace(/'/g,"\\'")}')`){
        el.setAttribute('onclick',`openProfile('${newName.replace(/'/g,"\\'")}')`);
      }
    });
    if(profilePhotos[oldName]!==undefined){ profilePhotos[newName]=profilePhotos[oldName]; delete profilePhotos[oldName]; }
    toast('✅ اسم تغییر کرد');
    openProfile(myName);
  }catch(err){
    toast('❌ تغییر اسم ناموفق بود');
  }
};

/* ─── آپلود عکس پروفایل ─── */
async function handleAvatarUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ toast('فقط فایل عکس'); return; }
  if(file.size > 5*1024*1024){ toast('حجم عکس باید کمتر از ۵ مگابایت باشه'); return; }

  toast('در حال آپلود… ⏳');
  try{
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=`${encodeURIComponent(myName)}-${Date.now()}.${ext}`;
    const res=await fetch(`${SB_URL}/storage/v1/object/avatars/${path}`,{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+(authToken||SB_KEY),
        'Content-Type':file.type,
        'x-upsert':'true'
      },
      body:file
    });
    if(!res.ok) throw new Error(await res.text());
    const publicUrl=`${SB_URL}/storage/v1/object/public/avatars/${path}`;
    await api('/rest/v1/profiles',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({name:myName,photo_url:publicUrl})
    });
    profilePhotos[myName]=publicUrl;
    renderAvatarInto(document.getElementById('hav'), myAv, publicUrl);
    /* آپدیت آواتارهای فعلی توی پیام‌ها */
    document.querySelectorAll('.mav.clickable').forEach(el=>{
      if(el.getAttribute('onclick')===`openProfile('${myName.replace(/'/g,"\\'")}')`){
        el.innerHTML=`<img src="${esc(publicUrl)}" alt=""/>`;
      }
    });
    toast('✅ عکس پروفایل آپدیت شد');
    openProfile(myName);
  }catch(err){
    toast('❌ آپلود ناموفق بود');
  }
}


function formatMentions(text, isMine){
  return text.replace(/@([\w\u0600-\u06FF\u200c]+)/g,(m,name)=>{
    const cls=isMine?'mention mine':'mention';
    return `<span class="${cls}" onclick="openProfile('${name.replace(/'/g,"\\'")}')">@${name}</span>`;
  });
}

function appendMsg(msg){
  const container=document.getElementById('messages');
  const isMine=msg.name===myName;
  const dt=new Date(msg.created_at);
  const timeStr=dt.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
  const gapTop=msg.name!==lastUid; lastUid=msg.name;
  if(msg.text&&(msg.text.startsWith('__SIG__')||msg.text.startsWith('__PRESENCE__'))) return;
  if(mutedUsers.has(msg.name)) return;

  const isSys=msg.text&&msg.text.startsWith('__EVT__');
  const isMedia=msg.text&&msg.text.startsWith('__MEDIA__');
  let displayText='', plainText='';

  if(isSys){
    displayText=msg.text.replace('__EVT__','');
    plainText=displayText;
  } else if(isMedia){
    const typeM=msg.text.match(/__MEDIA__(image|video)__/);
    const mediaType=typeM?typeM[1]:'image';
    const afterType=msg.text.replace(/^__MEDIA__(?:image|video)__/,'');
    const urlM=afterType.match(/^(https?:\/\/[^\s]+?\/storage\/v1\/object\/public\/chat-(?:images|videos)\/[^_]+\.[a-z0-9]+)/i);
    const mediaUrl=urlM?urlM[1]:'';
    const capIdx=msg.text.indexOf('CAP__');
    const caption=capIdx>-1?esc(msg.text.slice(capIdx+5)):'';
    plainText=mediaType==='video'?'📹 فیلم':'🖼 عکس';
    if(mediaType==='video'){
      displayText=`<video class="chat-media" src="${esc(mediaUrl)}" controls playsinline></video>${caption?'<br>'+caption:''}`;
    } else {
      displayText=`<img class="chat-media" src="${esc(mediaUrl)}" alt="عکس" onclick="window.open('${esc(mediaUrl)}','_blank')" loading="lazy"/>${caption?'<br>'+caption:''}`;
    }
  } else {
    plainText=msg.text||'';
    displayText=formatMentions(esc(msg.text).replace(/\n/g,'<br>'), isMine);
  }

  /* ریپلای */
  let replyHtml='';
  if(msg.reply_to_id && msg.reply_to_name && msg.reply_to_text){
    const rText=esc(msg.reply_to_text).slice(0,60)+(msg.reply_to_text.length>60?'…':'');
    replyHtml=`<div class="reply-preview" onclick="scrollToMsg(${msg.reply_to_id})">
      <div class="rp-name">${esc(msg.reply_to_name)}</div>
      <div class="rp-text">${rText}</div>
    </div>`;
  }

  const avatar=esc(msg.avatar||'🧑');
  const photo=profilePhotos[msg.name];
  const avInner=photo?`<img src="${esc(photo)}" alt=""/>`:avatar;
  const safeName=esc(msg.name).replace(/'/g,"\\'");

  const row=document.createElement('div');
  row.className=`msg-row ${isMine?'mine':''} ${gapTop?'gtop':''}`;
  row.dataset.msgId=msg.id;
  row.innerHTML=`
    ${gapTop?`<div class="mav${!isSys?' clickable':''}" ${!isSys?`onclick="openProfile('${safeName}')"`:''}>${avInner}</div>`:`<div class="mav-ph"></div>`}
    <div class="bwrap">
      ${(!isMine&&gapTop&&!isSys)?`<div class="sname clickable" id="sname-${msg.id}" onclick="openProfile('${safeName}')">${esc(msg.name)}</div>`:''}
      <div class="bubble${isSys?' sys':''}">
        ${replyHtml}
        ${displayText}
      </div>
      ${!isSys?`<div class="reactions-row" id="reactions-${msg.id}"></div>`:''}
      ${!isSys?`<div class="bmeta">${timeStr}${isMine?' ✓✓':''}${isAdmin?` <span style="opacity:.5">#${msg.id}</span>`:''}</div>`:''}
    </div>`;

  /* رنگ اسم بر اساس رنک */
  if(!isMine && !isSys && gapTop){
    getNameColor(msg.name).then(color=>{
      const snameEl=document.getElementById('sname-'+msg.id);
      if(snameEl && color){
        if(color.startsWith('linear')){
          snameEl.style.cssText+=`;background:${color};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700`;
        } else {
          snameEl.style.color=color;
          snameEl.style.fontWeight='700';
        }
      }
    });
  }

  /* منوی طولانی-فشار / راست‌کلیک */
  if(!isSys){
    let pressTimer=null;
    const bubble=row.querySelector('.bubble');
    const openMenu=()=>showMsgMenu(msg, plainText, row, isMine);
    bubble.addEventListener('contextmenu',e=>{e.preventDefault();openMenu();});
    bubble.addEventListener('touchstart',()=>{ pressTimer=setTimeout(openMenu,500); },{passive:true});
    bubble.addEventListener('touchend',()=>clearTimeout(pressTimer));
    bubble.addEventListener('touchmove',()=>clearTimeout(pressTimer));
  }

  container.appendChild(row);
  msgElements[msg.id]=row;

  /* ری‌اکشن‌های ذخیره‌شده */
  if(reactions[msg.id]) renderReactions(msg.id);

  if(!isSys && !(msg.name in profilePhotos)) fetchProfilePhoto(msg.name);
}

/* ══════════════════════════════════════
   MSG MENU (راست‌کلیک / فشار طولانی)
══════════════════════════════════════ */
function showMsgMenu(msg, plainText, row, isMine){
  document.getElementById('reaction-picker')?.remove();
  document.querySelectorAll('.msg-menu').forEach(m=>m.remove());

  const menu=document.createElement('div');
  menu.className='msg-menu';

  const items=[
    {icon:'😀', label:'ری‌اکشن', fn:()=>{ menu.remove(); showReactionPicker(msg.id, row); }},
    {icon:'↩️', label:'ریپلای', fn:()=>{ menu.remove(); setReply(msg.id, msg.name, plainText); }},
  ];
  if(isAdmin || isMine){
    items.push({icon:'📌', label:'پین کردن', fn:()=>{ menu.remove(); pinMessage(msg.id, plainText, msg.name); }});
  }
  if(isMine){
    items.push({sep:true});
    items.push({icon:'🗑', label:'حذف پیام', fn:()=>{ menu.remove(); deleteMyMsg(msg.id, plainText); }, danger:true});
  }
  if(!isMine && !isAdmin){
    items.push({sep:true});
    items.push({icon:'🔇', label:mutedUsers.has(msg.name)?'رفع میوت':'میوت کاربر', fn:()=>{ menu.remove(); toggleMuteUser(msg.name); }});
  }
  if(isAdmin && !isMine){
    items.push({sep:true});
    items.push({icon:'🔇', label:mutedUsers.has(msg.name)?'رفع میوت':'میوت (محلی)', fn:()=>{ menu.remove(); toggleMuteUser(msg.name); }});
    items.push({icon:'🗑', label:'حذف این پیام (ادمین)', fn:()=>{ menu.remove(); adminDelMsg(msg.id); }, danger:true});
  }

  items.forEach(item=>{
    if(item.sep){ const s=document.createElement('div'); s.className='msg-menu-sep'; menu.appendChild(s); return; }
    const btn=document.createElement('button');
    btn.className='msg-menu-item'+(item.danger?' danger':'');
    btn.innerHTML=`<span>${item.icon}</span><span>${item.label}</span>`;
    btn.onclick=item.fn;
    menu.appendChild(btn);
  });

  document.body.appendChild(menu);
  /* موقعیت */
  const rect=row.getBoundingClientRect();
  let top=rect.top+window.scrollY+10;
  let left=isMine? rect.left-170 : rect.right+6;
  if(left<6) left=6;
  if(left+170>window.innerWidth) left=window.innerWidth-176;
  if(top+240>window.innerHeight) top=window.innerHeight-245;
  menu.style.top=top+'px'; menu.style.left=left+'px';

  setTimeout(()=>document.addEventListener('click',function h(){menu.remove();document.removeEventListener('click',h);},{ once:true }),50);
}

/* ══ ری‌اکشن‌ها ══ */
const REACTION_EMOJIS=['❤️','😂','👍','🔥','😮','😢','👏','🎉'];
function showReactionPicker(msgId, row){
  document.getElementById('reaction-picker')?.remove();
  const picker=document.createElement('div');
  picker.id='reaction-picker';
  REACTION_EMOJIS.forEach(e=>{
    const btn=document.createElement('button');
    btn.className='rp-emoji'; btn.textContent=e;
    btn.onclick=()=>{ picker.remove(); addReaction(msgId, e); };
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  const rect=row.getBoundingClientRect();
  let top=rect.top-55;
  if(top<6) top=rect.bottom+6;
  picker.style.top=top+'px';
  picker.style.left=Math.max(6,Math.min(rect.left, window.innerWidth-picker.offsetWidth-10))+'px';
  setTimeout(()=>document.addEventListener('click',function h(){picker.remove();document.removeEventListener('click',h);},{once:true}),50);
}
function addReaction(msgId, emoji){
  if(!reactions[msgId]) reactions[msgId]={};
  if(!reactions[msgId][emoji]) reactions[msgId][emoji]=[];
  const list=reactions[msgId][emoji];
  const idx=list.indexOf(myName);
  if(idx>-1) list.splice(idx,1); else list.push(myName);
  if(list.length===0) delete reactions[msgId][emoji];
  /* ذخیره در localStorage (سمت کلاینت — برای سرور باید جدول جداگانه بسازی) */
  localStorage.setItem('reactions', JSON.stringify(reactions));
  renderReactions(msgId);
}
function renderReactions(msgId){
  const el=document.getElementById('reactions-'+msgId);
  if(!el||!reactions[msgId]) return;
  el.innerHTML=Object.entries(reactions[msgId])
    .filter(([,list])=>list.length>0)
    .map(([emoji,list])=>`
      <button class="reaction-chip${list.includes(myName)?' mine':''}" onclick="addReaction(${msgId},'${emoji}')">
        <span class="rc">${emoji}</span><span class="cnt">${list.length}</span>
      </button>`).join('');
}

async function deleteMyMsg(id, text){
  const choice=confirm('پیام رو برای همه پاک کنی یا فقط برای خودت؟\n\nOK = برای همه\nCancel = فقط برای خودت');
  if(choice){
    /* حذف برای همه */
    try{
      await api(`/rest/v1/messages?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
      const el=msgElements[id]; if(el) el.remove();
      delete msgElements[id];

  } else {
    /* فقط از دید خودت */
    const el=msgElements[id];
    if(el){ el.style.display='none'; toast('👁 پیام فقط برای تو مخفی شد'); }
  }
}
async function adminDelMsg(id){

    await api(`/rest/v1/messages?id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});
    const el=msgElements[id]; if(el) el.remove();

/* ══ میوت کاربر ══ */
function toggleMuteUser(name){
  if(mutedUsers.has(name)){
    mutedUsers.delete(name);
    toast(`🔊 ${name} از حالت میوت خارج شد`);
  } else {
    mutedUsers.add(name);
    toast(`🔇 ${name} میوت شد (فقط برای تو)`);
    /* مخفی کردن پیام‌های موجود */

/* ══ سیستم لول و رنک (تا لول ۹۹۹) ══ */
/* XP از پیام + وویس. هر پیام = 10 XP، هر دقیقه وویس = 5 XP */
function calcXP(msgCount, voiceSeconds){
  return (msgCount||0)*10 + Math.floor((voiceSeconds||0)/60)*5;
}

/* تعریف رنک‌ها - هر رنک یه رنگ و اسم داره */
const RANKS = [
  {name:'نوچه',        color:'#6b7094', minLvl:1},
  {name:'مبتدی',       color:'#4ade80', minLvl:5},
  {name:'کاوشگر',     color:'#22d3ee', minLvl:15},
  {name:'ماجراجو',    color:'#818cf8', minLvl:30},
  {name:'مبارز',       color:'#a78bfa', minLvl:50},
  {name:'قهرمان',      color:'#f472b6', minLvl:80},
  {name:'استاد',       color:'#fb923c', minLvl:120},
  {name:'بزرگ‌استاد', color:'#fbbf24', minLvl:180},
  {name:'افسانه',      color:'#f59e0b', minLvl:250},
  {name:'اسطوره',      color:'#ef4444', minLvl:350},
  {name:'نیمه‌خدا',   color:'#ec4899', minLvl:500},
  {name:'خدا',         color:'#e879f9', minLvl:700},
  {name:'ابرخدا',      color:'linear-gradient(90deg,#7c6dfa,#fa6d9b,#fbbf24)', minLvl:900},
];

function getRank(level){
  let rank = RANKS[0];
  for(const r of RANKS){ if(level>=r.minLvl) rank=r; }
  return rank;
}

/* محاسبه لول از XP - اول‌ها خیلی سخت، آخرها سخت‌تره */
function calcLevel(xp){
  /* فرمول: XP برای لول n = 100 * n^1.8  */
  let level=1;
  while(level<999){
    const needed = Math.floor(100 * Math.pow(level, 1.8));
    if(xp < needed) break;
    xp -= needed;
    level++;
  }
  return level;
}

function xpForLevel(n){
  return Math.floor(100 * Math.pow(n, 1.8));
}

function getLevelInfo(msgCount, voiceSeconds){
  const xp = calcXP(msgCount, voiceSeconds);
  const level = calcLevel(xp);
  const rank = getRank(level);
  /* محاسبه progress در لول فعلی */
  let usedXP=0;
  for(let i=1;i<level;i++) usedXP+=xpForLevel(i);
  const xpInLevel = xp - usedXP;
  const xpNeeded = xpForLevel(level);
  const progress = level>=999 ? 100 : Math.min(100, Math.round(xpInLevel/xpNeeded*100));
  const isGradient = rank.color.startsWith('linear');
  const color = isGradient ? '#f59e0b' : rank.color;
  const bg = isGradient ? 'rgba(245,158,11,.15)' : rank.color+'26';
  return {level, rank, xp, xpInLevel, xpNeeded, progress, color, bg,
          label:`لول ${level} · ${rank.name}`, next: level<999?level+1:null};
}

/* رنگ اسم کاربر در چت بر اساس لول */
const rankColorCache={};
async function getNameColor(name){
  if(rankColorCache[name]) return rankColorCache[name];
  try{
    const rows=await api(`/rest/v1/profiles?name=eq.${encodeURIComponent(name)}&select=message_count,voice_seconds`);
    const p=rows[0]||{};
    const info=getLevelInfo(p.message_count||0, p.voice_seconds||0);
    const rank=info.rank;
    rankColorCache[name]=rank.color;
    return rank.color;
  }catch{ return null; }
}

   سیستم صدا (Web Audio API — بدون فایل خارجی)

let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}

/* صدای ورود به وویس - یه تون صعودی شاد */
function playJoinSound(){
  try{
    const ctx = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i*0.1);
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.1);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i*0.1 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.1 + 0.22);
      osc.start(ctx.currentTime + i*0.1);
      osc.stop(ctx.currentTime + i*0.1 + 0.25);
    });
  }catch{}
}

/* صدای خروج از وویس - یه تون نزولی */
function playLeaveSound(){
  try{
    const ctx = getAudioCtx();
    const notes = [783.99, 659.25, 523.25, 392.00]; // G5 E5 C5 G4
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i*0.09);
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.09);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.09 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.09 + 0.2);
      osc.start(ctx.currentTime + i*0.09);
      osc.stop(ctx.currentTime + i*0.09 + 0.22);
    });
  }catch{}
}

/* صدای ترکیدن برای کدهای مخفی */
function playExplosionSound(){
  try{
    const ctx = getAudioCtx();

    /* صدای انفجار با noise */
    const bufferSize = ctx.sampleRate * 0.8;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0; i<bufferSize; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 2.5);

    const source = ctx.createBufferSource();
    source.buffer = buffer;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.5);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(1.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);

    source.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    source.start(ctx.currentTime);
    source.stop(ctx.currentTime + 0.8);

    /* چند تون بالای ترکیدن */
    [880, 1100, 660].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g2 = ctx.createGain();
      osc.connect(g2); g2.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i*0.05);
      osc.frequency.exponentialRampToValueAtTime(freq*0.3, ctx.currentTime + i*0.05 + 0.3);
      g2.gain.setValueAtTime(0.2, ctx.currentTime + i*0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.05 + 0.35);
      osc.start(ctx.currentTime + i*0.05);
      osc.stop(ctx.currentTime + i*0.05 + 0.4);
    });
  }catch{}
}

async function syncVoiceMembers(){
  try{
    const cutoff=new Date(Date.now()-10000).toISOString();
    await api(`/rest/v1/voice_presence?updated_at=lt.${cutoff}`,{method:'DELETE',headers:{'Prefer':''}});
    const rows=await api(`/rest/v1/voice_presence?room_id=eq.${currentRoomId}&select=*`);
    voiceMembers={};
    rows.forEach(r=>{voiceMembers[r.name]={av:r.avatar,muted:r.muted||false};});
    renderVoiceBar();

    /* بررسی خودکار بستن روم: اگه خالی بود و روم عمومی (id=0) نبود */
    if(currentRoomId !== 0 && Object.keys(voiceMembers).length === 0){
      if(!window._emptyRoomTimer){
        window._emptyRoomTimer=setTimeout(async()=>{
          /* دوباره چک کن هنوز خالیه */
          const check=await api(`/rest/v1/voice_presence?room_id=eq.${currentRoomId}&select=name`).catch(()=>[]);
          if(check.length===0 && currentRoomId!==0){
            /* حذف روم */
            await api(`/rest/v1/voice_rooms?id=eq.${currentRoomId}`,{method:'DELETE',headers:{'Prefer':''}}).catch(()=>{});
            toast(`🔕 روم «${currentRoomName}» بعد از ۵ دقیقه خلوت بسته شد`);
            /* برگرد به روم عمومی */
            await switchVoiceRoom(0,'روم عمومی',false);
          }
          window._emptyRoomTimer=null;
        }, 5*60*1000);
      }
    } else {
      /* اگه کسی اومد تایمر رو کنسل کن */
      if(window._emptyRoomTimer){
        clearTimeout(window._emptyRoomTimer);
        window._emptyRoomTimer=null;
      }
    }
  }catch{}
}

async function joinVoiceRoom(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  }catch{
    toast('اجازه میکروفون داده نشد! ⚠️'); return;
  }
  inVoice=true;
  isMuted=false;
  voiceJoinTime=Date.now();
  await api('/rest/v1/voice_presence',{
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({name:myName,avatar:myAv,muted:false,room_id:currentRoomId,updated_at:new Date().toISOString()})
  });
  await syncVoiceMembers();
  for(const peerName of Object.keys(voiceMembers)){
    if(peerName!==myName && !peers[peerName]){
      await connectToPeer(peerName, true);
    }
  }
  updateVoiceUI();
  window._hbTimer=setInterval(heartbeat,4000);
  startSpeakDetection();
  playJoinSound();
  sysMsg('🎙 '+myName+' وارد روم صوتی «'+currentRoomName+'» شد');
}

let voiceJoinTime=null;

async function leaveVoiceRoom(){
  inVoice=false;
  clearInterval(window._hbTimer);
  try{ await api(`/rest/v1/voice_presence?name=eq.${encodeURIComponent(myName)}`,{method:'DELETE',headers:{'Prefer':''}}); }catch{}
  for(const pn of Object.keys(peers)){
    peers[pn].pc.close();
    if(peers[pn].audioEl) peers[pn].audioEl.remove();
  }
  peers={};
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  /* ثبت مدت زمان حضور در روم صوتی */
  if(voiceJoinTime){
    const seconds=Math.round((Date.now()-voiceJoinTime)/1000);
    voiceJoinTime=null;
    if(seconds>0){
      api('/rest/v1/rpc/increment_voice_seconds',{method:'POST',body:JSON.stringify({p_name:myName,p_seconds:seconds})}).catch(()=>{});
      /* invalidate رنگ رنک خودم */
      delete rankColorCache[myName];
    }
  }
  updateVoiceUI();
  await syncVoiceMembers();
  playLeaveSound();
  sysMsg('🔇 '+myName+' از روم صوتی «'+currentRoomName+'» خارج شد');
}

async function connectToPeer(peerName, isInitiator){
  if(peers[peerName]) return;
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  const audioEl=document.createElement('audio');
  audioEl.autoplay=true; audioEl.playsInline=true;
  document.body.appendChild(audioEl);
  peers[peerName]={pc,audioEl};

  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack=e=>{ audioEl.srcObject=e.streams[0]; };
  pc.onicecandidate=e=>{
    if(e.candidate) sendSignal('candidate',peerName,{candidate:e.candidate});
  };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='failed'||pc.connectionState==='disconnected'){
      if(peers[peerName]){ peers[peerName].pc.close(); if(peers[peerName].audioEl) peers[peerName].audioEl.remove(); delete peers[peerName]; }
      /* تلاش مجدد برای اتصال بعد از ۲ ثانیه */
      if(inVoice){
        setTimeout(async()=>{
          if(inVoice && voiceMembers[peerName] && !peers[peerName]){
            await connectToPeer(peerName, myName>peerName);
          }
        }, 2000);
      }
    }
    if(pc.connectionState==='connected'){
      /* مطمئن شو audio element داره پخش می‌کنه */
      if(peers[peerName]&&peers[peerName].audioEl){
        const el=peers[peerName].audioEl;
        if(el.paused) el.play().catch(()=>{});
      }
    }
  };

  if(isInitiator){
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await sendSignal('offer',peerName,{sdp:offer});
  }
}

async function sendSignal(type, toPeer, payload){
  try{
    await api('/rest/v1/signals',{
      method:'POST',
      body:JSON.stringify({from_name:myName,from_av:myAv,to_name:toPeer,type,payload:JSON.stringify(payload),room_id:currentRoomId})
    });
  }catch{}
}

async function pollSignals(){
  if(!myName) return;
  try{
    const rows=await api(`/rest/v1/signals?to_name=eq.${encodeURIComponent(myName)}&room_id=eq.${currentRoomId}&id=gt.${lastSignalId}&order=id.asc&select=*`);
    for(const row of rows){
      if(row.id>lastSignalId) lastSignalId=row.id;
      if(row.from_name===myName) continue;
      await handleSignal(row);
    }
  }catch{}
  await syncVoiceMembers();
  if(inVoice){
    for(const peerName of Object.keys(voiceMembers)){
      if(peerName!==myName && !peers[peerName]){
        await connectToPeer(peerName, myName>peerName);
      }
    }
  }
}

async function handleSignal(sig){
  const payload=sig.payload?JSON.parse(sig.payload):{};
  switch(sig.type){
    case 'offer':
      if(!inVoice) return;
      await connectToPeer(sig.from_name,false);
      await peers[sig.from_name].pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      const answer=await peers[sig.from_name].pc.createAnswer();
      await peers[sig.from_name].pc.setLocalDescription(answer);
      await sendSignal('answer',sig.from_name,{sdp:answer});
      break;
    case 'answer':
      if(peers[sig.from_name]){
        await peers[sig.from_name].pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      }
      break;
    case 'candidate':
      if(peers[sig.from_name]){
        try{ await peers[sig.from_name].pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); }catch{}
      }
      break;
  }
}

function startSpeakDetection(){
  if(!localStream) return;
  try{
    const ctx=new AudioContext();
    const src=ctx.createMediaStreamSource(localStream);
    const analyser=ctx.createAnalyser();
    analyser.fftSize=512;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    let speaking=false;
    setInterval(()=>{
      if(!inVoice){ return; }
      analyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      const nowSpeaking=avg>15&&!isMuted;
      if(nowSpeaking!==speaking){
        speaking=nowSpeaking;
        renderVoiceBar();
      }
    },100);
    window._localSpeaking=()=>speaking&&!isMuted;
  }catch{}
}

window.toggleMute=function(){
  isMuted=!isMuted;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('mute-btn').className='vc-btn'+(isMuted?' muted':'');
  document.getElementById('mute-btn').textContent=isMuted?'🔇':'🎤';
  heartbeat();
  renderVoiceBar();
};

    joinBtn.textContent='خروج از صدا';

function renderVoiceBar(){
  const wrap=document.getElementById('vb-members');
  const names=Object.keys(voiceMembers);
  if(names.length===0){
    wrap.innerHTML='<span class="vb-empty">کسی اینجا نیست</span>';
    return;
  }
  wrap.innerHTML='';
  names.forEach(n=>{
    const m=voiceMembers[n];
    const isMe=n===myName;
    const speaking=isMe&&window._localSpeaking&&window._localSpeaking();
    const chip=document.createElement('div');
    chip.className='vm-chip'+(speaking?' speaking':'');
    chip.innerHTML=`<span class="vm-av">${esc(m.av||'🧑')}</span><span class="vm-name">${esc(n)}</span>${m.muted?'<span class="vm-mute">🔇</span>':''}`;
    wrap.appendChild(chip);
  });
}

async function sysMsg(text){
  try{
    const rows=await api('/rest/v1/messages',{method:'POST',body:JSON.stringify({name:myName,avatar:myAv,text:'__EVT__'+text})});
    if(rows&&rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); if(rows[0].id>lastId){ appendMsg(rows[0]); lastId=rows[0].id; scrollBottom(); } }

}
