<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GapChat</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0b0d12; --surface:#13161f; --panel:#1a1e2a; --border:#252a3a;
  --accent:#7c6dfa; --accent2:#fa6d9b; --teal:#2dd4bf; --green:#22c55e;
  --text:#e2e5f0; --muted:#6b7094;
  --font:'Vazirmatn',system-ui,sans-serif; --ease:.18s cubic-bezier(.4,0,.2,1);
}
[data-theme=light]{--bg:#f2f4fb;--surface:#fff;--panel:#e8ebf7;--border:#d0d5ea;--text:#1a1d2e;--muted:#6b6f8a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background var(--ease),color var(--ease)}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:28px;padding:24px}
.login-logo{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(124,109,250,.35)}
.login-title{font-size:26px;font-weight:700}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:16px}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.ifield{padding:12px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;font-size:14px;width:100%;transition:border-color var(--ease)}
.ifield:focus{border-color:var(--accent)}
.av-row{display:flex;gap:8px;flex-wrap:wrap}
.av-opt{width:42px;height:42px;border-radius:11px;font-size:20px;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.av-opt:hover{border-color:var(--accent);transform:scale(1.08)}
.av-opt.sel{border-color:var(--accent);background:rgba(124,109,250,.15)}
.join-btn{padding:13px;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:all var(--ease);box-shadow:0 4px 16px rgba(124,109,250,.3)}
.join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,109,250,.4)}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.hl{display:flex;align-items:center;gap:10px}
.hav{width:36px;height:36px;border-radius:11px;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--panel)}
.hname{font-size:14px;font-weight:600}
.hstatus{font-size:11px;color:var(--muted)}
.hr{display:flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--ease)}
.icon-btn:hover{background:var(--border)}

/* VOICE ROOM BAR */
#voice-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.vb-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vb-icon{font-size:16px}
.vb-info{display:flex;flex-direction:column;gap:1px}
.vb-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.vb-members{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.vm-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--panel);border:1px solid var(--border);font-size:12px;transition:all .2s}
.vm-chip.speaking{border-color:var(--green);background:rgba(34,197,94,.1);box-shadow:0 0 0 2px rgba(34,197,94,.2)}
.vm-chip .vm-av{font-size:13px}
.vm-chip .vm-name{color:var(--text);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vm-chip .vm-mute{font-size:10px;opacity:.6}
.vb-join-btn{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);transition:all var(--ease);white-space:nowrap}
.vb-join-btn:hover{background:rgba(34,197,94,.25)}
.vb-join-btn.leave{background:rgba(229,51,74,.1);color:#e5334a;border-color:rgba(229,51,74,.3)}
.vb-join-btn.leave:hover{background:rgba(229,51,74,.2)}
.vb-controls{display:flex;gap:6px}
.vc-btn{width:30px;height:30px;border-radius:8px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);transition:all var(--ease)}
.vc-btn:hover{background:var(--border)}
.vc-btn.muted{background:rgba(250,109,155,.1);border-color:var(--accent2);color:var(--accent2)}
.vb-empty{font-size:12px;color:var(--muted);font-style:italic}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex;gap:6px;align-items:flex-end;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-row.mine{flex-direction:row-reverse}
.msg-row.gtop{margin-top:10px}
.mav{width:26px;height:26px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mav-ph{width:26px;flex-shrink:0}
.bwrap{display:flex;flex-direction:column;max-width:70%}
.msg-row.mine .bwrap{align-items:flex-end}
.sname{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 3px}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.msg-row:not(.mine) .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-right-radius:5px}
.msg-row.mine .bubble{background:var(--accent);color:#fff;border-bottom-left-radius:5px}
.bubble.sys{background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center;padding:5px 12px;border-radius:99px}
.msg-row.mine .bubble.sys{background:transparent;border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.5)}
.bmeta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px}
.msg-row.mine .bmeta{text-align:left;color:rgba(255,255,255,.5)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4}
.empty-icon{font-size:44px}
.empty-txt{font-size:13px;color:var(--muted)}

/* TYPING */
#typing{min-height:20px;padding:2px 14px 4px;font-size:12px;color:var(--muted)}

/* INPUT */
#input-bar{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.estrip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.estrip::-webkit-scrollbar{height:0}
.eq{width:30px;height:30px;border-radius:8px;font-size:16px;flex-shrink:0;background:var(--panel);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.eq:hover{background:var(--border);transform:scale(1.1)}
.irow{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;padding:10px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;font-size:14px;resize:none;max-height:110px;line-height:1.55;transition:border-color var(--ease)}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:var(--accent);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all var(--ease);box-shadow:0 3px 12px rgba(124,109,250,.3)}
#send-btn:hover{transform:scale(1.06)}
#send-btn:active{transform:scale(.95)}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--border);padding:9px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:99;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#err{display:none;background:#e5334a;color:#fff;font-size:12px;text-align:center;padding:7px}
@media(max-width:480px){.bwrap{max-width:82%}}
</style>
</head>
<body data-theme="dark">
<div id="app">
<div id="err"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-logo">💬</div>
  <div class="login-title">GapChat</div>
  <div class="login-card">
    <div>
      <div class="lbl">اسمت چیه؟</div>
      <input class="ifield" id="name-input" placeholder="مثلاً: علی، سارا…" maxlength="20"/>
    </div>
    <div>
      <div class="lbl">آواتار</div>
      <div class="av-row" id="av-row"></div>
    </div>
    <button class="join-btn" onclick="joinChat()">ورود به چت ←</button>
  </div>
</div>

<!-- HEADER -->
<header id="header" style="display:none">
  <div class="hl">
    <div class="hav" id="hav"></div>
    <div>
      <div class="hname" id="hname"></div>
      <div class="hstatus" id="hstatus">در حال اتصال…</div>
    </div>
  </div>
  <div class="hr">
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button class="icon-btn" onclick="leaveChat()">🚪</button>
  </div>
</header>

<!-- VOICE ROOM BAR -->
<div id="voice-bar" style="display:none">
  <div class="vb-left">
    <div class="vb-icon">🔊</div>
    <div class="vb-info">
      <div class="vb-title">روم صوتی</div>
      <div class="vb-members" id="vb-members">
        <span class="vb-empty">کسی اینجا نیست</span>
      </div>
    </div>
  </div>
  <div class="vb-controls" id="vb-controls" style="display:none">
    <button class="vc-btn" id="mute-btn" onclick="toggleMute()" title="میکروفون">🎤</button>
  </div>
  <button class="vb-join-btn" id="vb-join-btn" onclick="toggleVoiceRoom()">ورود به صدا</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div id="messages">
    <div class="empty" id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-txt">اولین پیام رو بفرست!</div>
    </div>
  </div>
  <div id="typing"></div>
  <div id="input-bar">
    <div class="estrip" id="estrip"></div>
    <div class="irow">
      <textarea id="msg-input" rows="1" placeholder="پیام بنویس…"></textarea>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
</div>
<div id="toast"></div>
<!-- audio elements برای هر peer به صورت داینامیک اضافه می‌شن -->

<script>
/* ═══════════════════════════ CONFIG ═══════════════════════════ */
const SUPABASE_URL = 'https://qbvrxcvntaopmtzaorgc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFidnJ4Y3ZudGFvcG10emFvcmdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjA2MTEsImV4cCI6MjA5NjgzNjYxMX0.7Q0lsPJBOum43p-DmXdn6c9TPMgUGSr7JxyiQ_FTaio';

const ICE_SERVERS = [
  { urls:'stun:stun.l.google.com:19302' },
  { urls:'stun:stun1.l.google.com:19302' },
  { urls:'stun:stun.cloudflare.com:3478' },
];

const AVATARS = ['🧑','👩','🧔','👱','🧑‍💻','👩‍💻','🦊','🐼','🐸','🐺'];
const EMOJIS  = ['😄','😂','❤️','🔥','👍','😍','🥺','😤','🎉','💯'];

let myName=null, myAv=AVATARS[0], selectedAv=AVATARS[0];
let lastId=0, lastUid='', pollTimer=null;

/* ═══ VOICE ROOM STATE ═══ */
let inVoice = false;           // آیا من توی رومم؟
let localStream = null;        // میکروفون من
let isMuted = false;
let peers = {};                // { peerName: { pc, audioEl } }
let voiceMembers = {};         // { name: { av, muted } } — همه توی روم
let lastSignalId = 0;
let speakingTimers = {};       // برای detect کردن صدا

/* ─── BUILD UI ─── */
(()=>{
  const avRow=document.getElementById('av-row');
  AVATARS.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='av-opt'+(i===0?' sel':'');
    b.textContent=a;
    b.onclick=()=>{ document.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); selectedAv=a; };
    avRow.appendChild(b);
  });
  const strip=document.getElementById('estrip');
  EMOJIS.forEach(e=>{
    const b=document.createElement('button');
    b.className='eq'; b.textContent=e;
    b.onclick=()=>{ const i=document.getElementById('msg-input'); i.value+=e; i.focus(); };
    strip.appendChild(b);
  });
})();

/* ─── API ─── */
async function apiFetch(path, opts={}){
  const res=await fetch(SUPABASE_URL+path,{
    ...opts,
    headers:{ 'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{}) }
  });
  if(!res.ok){ throw new Error(await res.text()); }
  const t=await res.text(); return t?JSON.parse(t):[];
}

/* ─── JOIN CHAT ─── */
window.joinChat=async function(){
  const n=document.getElementById('name-input').value.trim();
  if(!n){ toast('یه اسم وارد کن 😅'); return; }
  myName=n; myAv=selectedAv;
  document.getElementById('login').style.display='none';
  document.getElementById('header').style.display='flex';
  document.getElementById('voice-bar').style.display='flex';
  const chat=document.getElementById('chat');
  chat.style.display='flex'; chat.style.flexDirection='column';
  document.getElementById('hav').textContent=myAv;
  document.getElementById('hname').textContent=myName;
  document.getElementById('hstatus').textContent='متصل شد ✓';
  await loadMessages();
  startPolling();
  /* بار اول وضعیت روم رو بگیر */
  await syncVoiceMembers();
};

/* ─── MESSAGES ─── */
async function loadMessages(){
  try{
    const rows=await apiFetch('/rest/v1/messages?order=id.asc&select=*');
    if(rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); }
    rows.forEach(r=>{ if(r.id>lastId){ appendMsg(r); lastId=r.id; } });
    scrollBottom();
  }catch(e){ showErr('خطا در بارگذاری: '+e.message); }
}

function startPolling(){
  pollTimer=setInterval(async()=>{
    /* پیام‌های جدید */
    try{
      const rows=await apiFetch(`/rest/v1/messages?id=gt.${lastId}&order=id.asc&select=*`);
      if(rows.length){
        const em=document.getElementById('empty-state'); if(em) em.remove();
        rows.forEach(r=>{ appendMsg(r); lastId=r.id; });
        scrollBottom();
      }
    }catch{}
    /* سیگنال‌های WebRTC */
    await pollSignals();
  }, 1500);
}

window.sendMsg=async function(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||!myName) return;
  inp.value=''; inp.style.height='';
  try{
    const rows=await apiFetch('/rest/v1/messages',{method:'POST',body:JSON.stringify({name:myName,avatar:myAv,text})});
    if(rows&&rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); if(rows[0].id>lastId){ appendMsg(rows[0]); lastId=rows[0].id; scrollBottom(); } }
  }catch(e){ showErr('پیام ارسال نشد'); inp.value=text; }
};

function appendMsg(msg){
  const container=document.getElementById('messages');
  const isMine=msg.name===myName;
  const dt=new Date(msg.created_at);
  const timeStr=dt.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
  const gapTop=msg.name!==lastUid; lastUid=msg.name;
  if(msg.text&&(msg.text.startsWith('__SIG__')||msg.text.startsWith('__PRESENCE__'))) return;
  const row=document.createElement('div');
  row.className=`msg-row ${isMine?'mine':''} ${gapTop?'gtop':''}`;
  const isSys=msg.text&&msg.text.startsWith('__EVT__');
  const displayText=isSys?msg.text.replace('__EVT__',''):esc(msg.text).replace(/\n/g,'<br>');
  row.innerHTML=`
    ${gapTop?`<div class="mav">${esc(msg.avatar||'🧑')}</div>`:`<div class="mav-ph"></div>`}
    <div class="bwrap">
      ${(!isMine&&gapTop&&!isSys)?`<div class="sname">${esc(msg.name)}</div>`:''}
      <div class="bubble${isSys?' sys':''}">${displayText}</div>
      ${!isSys?`<div class="bmeta">${timeStr}${isMine?' ✓✓':''}</div>`:''}
    </div>`;
  container.appendChild(row);
}

/* ═══════════════════════════════════════════════════
   VOICE ROOM
   ── Signaling از طریق جدول signals در Supabase ──
   ── Presence از طریق جدول voice_presence ──
═══════════════════════════════════════════════════ */

/* وضعیت روم رو از جدول voice_presence بخون */
async function syncVoiceMembers(){
  try{
    /* حذف رکوردهای قدیمی (بیشتر از ۱۰ ثانیه) */
    const cutoff=new Date(Date.now()-10000).toISOString();
    await apiFetch(`/rest/v1/voice_presence?updated_at=lt.${cutoff}`,{method:'DELETE',headers:{'Prefer':''}});
    const rows=await apiFetch('/rest/v1/voice_presence?select=*');
    const newMembers={};
    rows.forEach(r=>{ newMembers[r.name]={av:r.avatar,muted:r.muted||false}; });
    voiceMembers=newMembers;
    renderVoiceBar();
  }catch{}
}

/* heartbeat: هر ۴ ثانیه یه بار وضعیت خودمون رو آپدیت کن */
async function heartbeat(){
  if(!inVoice||!myName) return;
  try{
    await apiFetch('/rest/v1/voice_presence',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({name:myName,avatar:myAv,muted:isMuted,updated_at:new Date().toISOString()})
    });
  }catch{}
}

/* ورود/خروج از روم */
window.toggleVoiceRoom=async function(){
  if(!inVoice) await joinVoiceRoom();
  else await leaveVoiceRoom();
};

async function joinVoiceRoom(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  }catch{
    toast('اجازه میکروفون داده نشد! ⚠️'); return;
  }
  inVoice=true;
  isMuted=false;
  /* ثبت presence */
  await apiFetch('/rest/v1/voice_presence',{
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({name:myName,avatar:myAv,muted:false,updated_at:new Date().toISOString()})
  });
  /* sync وضعیت روم و connect به هر کسی که هست */
  await syncVoiceMembers();
  for(const peerName of Object.keys(voiceMembers)){
    if(peerName!==myName && !peers[peerName]){
      await connectToPeer(peerName, true); /* ما initiator هستیم */
    }
  }
  updateVoiceUI();
  /* heartbeat هر ۴ ثانیه */
  window._hbTimer=setInterval(heartbeat,4000);
  /* detect صدا */
  startSpeakDetection();
  sysMsg('🎙 '+myName+' وارد روم صوتی شد');
}

async function leaveVoiceRoom(){
  inVoice=false;
  clearInterval(window._hbTimer);
  /* پاک کردن presence */
  try{ await apiFetch(`/rest/v1/voice_presence?name=eq.${encodeURIComponent(myName)}`,{method:'DELETE',headers:{'Prefer':''}}); }catch{}
  /* بستن همه peer connectionها */
  for(const pn of Object.keys(peers)){
    peers[pn].pc.close();
    if(peers[pn].audioEl) peers[pn].audioEl.remove();
  }
  peers={};
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  updateVoiceUI();
  await syncVoiceMembers();
  sysMsg('🔇 '+myName+' از روم صوتی خارج شد');
}

/* ─── WebRTC peer connection ─── */
async function connectToPeer(peerName, isInitiator){
  if(peers[peerName]) return; /* قبلاً وصل شده */
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  /* audio element برای صدای این peer */
  const audioEl=document.createElement('audio');
  audioEl.autoplay=true; audioEl.playsInline=true;
  document.body.appendChild(audioEl);
  peers[peerName]={pc,audioEl};

  /* اضافه کردن track میکروفون */
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack=e=>{ audioEl.srcObject=e.streams[0]; };
  pc.onicecandidate=e=>{
    if(e.candidate) sendSignal('candidate',peerName,{candidate:e.candidate});
  };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='failed'||pc.connectionState==='disconnected'){
      if(peers[peerName]){ peers[peerName].pc.close(); if(peers[peerName].audioEl) peers[peerName].audioEl.remove(); delete peers[peerName]; }
    }
  };

  if(isInitiator){
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    await sendSignal('offer',peerName,{sdp:offer});
  }
}

/* ─── Signaling ─── */
async function sendSignal(type, toPeer, payload){
  try{
    await apiFetch('/rest/v1/signals',{
      method:'POST',
      body:JSON.stringify({from_name:myName,from_av:myAv,to_name:toPeer,type,payload:JSON.stringify(payload)})
    });
  }catch{}
}

async function pollSignals(){
  if(!myName) return;
  try{
    const rows=await apiFetch(`/rest/v1/signals?to_name=eq.${encodeURIComponent(myName)}&id=gt.${lastSignalId}&order=id.asc&select=*`);
    for(const row of rows){
      if(row.id>lastSignalId) lastSignalId=row.id;
      if(row.from_name===myName) continue;
      await handleSignal(row);
    }
  }catch{}
  /* sync اعضای روم */
  await syncVoiceMembers();
  /* اگه member جدیدی اومده و من توی رومم، connect کن */
  if(inVoice){
    for(const peerName of Object.keys(voiceMembers)){
      if(peerName!==myName && !peers[peerName]){
        await connectToPeer(peerName, myName>peerName); /* lexicographic تصمیم می‌گیره کی initiator باشه */
      }
    }
  }
}

async function handleSignal(sig){
  const payload=sig.payload?JSON.parse(sig.payload):{};
  switch(sig.type){
    case 'offer':
      if(!inVoice) return;
      await connectToPeer(sig.from_name,false);
      await peers[sig.from_name].pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      const answer=await peers[sig.from_name].pc.createAnswer();
      await peers[sig.from_name].pc.setLocalDescription(answer);
      await sendSignal('answer',sig.from_name,{sdp:answer});
      break;
    case 'answer':
      if(peers[sig.from_name]){
        await peers[sig.from_name].pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      }
      break;
    case 'candidate':
      if(peers[sig.from_name]){
        try{ await peers[sig.from_name].pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); }catch{}
      }
      break;
  }
}

/* ─── Voice Activity Detection ─── */
function startSpeakDetection(){
  if(!localStream) return;
  try{
    const ctx=new AudioContext();
    const src=ctx.createMediaStreamSource(localStream);
    const analyser=ctx.createAnalyser();
    analyser.fftSize=512;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    let speaking=false;
    setInterval(()=>{
      if(!inVoice){ return; }
      analyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      const nowSpeaking=avg>15&&!isMuted;
      if(nowSpeaking!==speaking){
        speaking=nowSpeaking;
        renderVoiceBar(); /* update chip */
      }
    },100);
    window._localSpeaking=()=>speaking&&!isMuted;
  }catch{}
}

/* ─── MUTE ─── */
window.toggleMute=function(){
  isMuted=!isMuted;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
  document.getElementById('mute-btn').className='vc-btn'+(isMuted?' muted':'');
  document.getElementById('mute-btn').textContent=isMuted?'🔇':'🎤';
  heartbeat();
  renderVoiceBar();
};

/* ─── UI ─── */
function updateVoiceUI(){
  const joinBtn=document.getElementById('vb-join-btn');
  const controls=document.getElementById('vb-controls');
  if(inVoice){
    joinBtn.textContent='خروج از صدا';
    joinBtn.className='vb-join-btn leave';
    controls.style.display='flex';
  } else {
    joinBtn.textContent='ورود به صدا';
    joinBtn.className='vb-join-btn';
    controls.style.display='none';
  }
  renderVoiceBar();
}

function renderVoiceBar(){
  const wrap=document.getElementById('vb-members');
  const names=Object.keys(voiceMembers);
  if(names.length===0){
    wrap.innerHTML='<span class="vb-empty">کسی اینجا نیست</span>';
    return;
  }
  wrap.innerHTML='';
  names.forEach(n=>{
    const m=voiceMembers[n];
    const isMe=n===myName;
    const speaking=isMe&&window._localSpeaking&&window._localSpeaking();
    const chip=document.createElement('div');
    chip.className='vm-chip'+(speaking?' speaking':'');
    chip.innerHTML=`<span class="vm-av">${esc(m.av||'🧑')}</span><span class="vm-name">${esc(n)}</span>${m.muted?'<span class="vm-mute">🔇</span>':''}`;
    wrap.appendChild(chip);
  });
}

async function sysMsg(text){
  try{
    const rows=await apiFetch('/rest/v1/messages',{method:'POST',body:JSON.stringify({name:myName,avatar:myAv,text:'__EVT__'+text})});
    if(rows&&rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); if(rows[0].id>lastId){ appendMsg(rows[0]); lastId=rows[0].id; scrollBottom(); } }
  }catch{}
}

/* ─── MISC ─── */
document.getElementById('msg-input').addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,110)+'px';
});
document.getElementById('msg-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
});
document.getElementById('name-input').addEventListener('keydown',e=>{ if(e.key==='Enter') joinChat(); });

window.leaveChat=function(){
  if(!confirm('از چت خارج بشی؟')) return;
  if(inVoice) leaveVoiceRoom();
  clearInterval(pollTimer); location.reload();
};
window.toggleTheme=function(){
  const b=document.body; const d=b.getAttribute('data-theme')==='dark';
  b.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('theme-btn').textContent=d?'🌙':'☀️';
};
function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',5000); }
</script>
