/* ─── MOBILE VIEWPORT FIX ───
   روی موبایل وقتی کیبورد بازه، 100vh درست محاسبه نمیشه و
   نوار ورودی پشت کیبورد یا پشت محتوا میره. این بخش با
   visualViewport ارتفاع واقعی صفحه رو محاسبه و به یه
   متغیر CSS می‌فرسته که #app از روی همون ارتفاعش رو می‌گیره. */
function setAppHeight(){
  const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  document.documentElement.style.setProperty('--app-vh', h+'px');
  scrollBottom();
}
setAppHeight();
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', ()=>setTimeout(setAppHeight,300));

function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function showErr(msg){ const e=document.getElementById('err-bar'); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',5000); }

/* وقتی صفحه بسته می‌شه، اگه توی روم صوتی بودیم، مدت زمان رو ذخیره کن
   و presence رو پاک کن (با sendBeacon چون async معمولی کار نمی‌کنه) */
window.addEventListener('beforeunload',()=>{
  if(!inVoice||!myName) return;
  const seconds=voiceJoinTime?Math.round((Date.now()-voiceJoinTime)/1000):0;
  const headers={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(authToken||SB_KEY)};
  if(seconds>0){
    try{ navigator.sendBeacon(SB_URL+'/rest/v1/rpc/increment_voice_seconds', new Blob([JSON.stringify({p_name:myName,p_seconds:seconds})],{type:'application/json'})); }catch{}
  }
});

/* ── منوی اعضای روم صوتی ── */
window.showVoiceMembersMenu = function(){
  const popup = document.getElementById('voice-members-popup');
  if(popup.style.display !== 'none'){ popup.style.display='none'; return; }

  const names = Object.keys(voiceMembers);
  const titleEl = document.getElementById('vb-room-name');
  const rect = titleEl.getBoundingClientRect();

  let html = `<div style="font-size:11px;font-weight:700;color:var(--muted);padding:4px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:6px">
    👥 اعضای ${currentRoomName} (${names.length} نفر)
  </div>`;

  if(names.length === 0){
    html += `<div style="font-size:12px;color:var(--muted);padding:6px 8px;text-align:center">کسی اینجا نیست</div>`;
  } else {
    html += names.map(n => {
      const m = voiceMembers[n];
      const isMe = n === myName;
      const isSpeaking = isMe && window._localSpeaking && window._localSpeaking();
      return `<div onclick="closeVoiceMembersMenu();openProfile('${escJs(n)}')" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .12s" onmouseover="this.style.background='var(--panel)'" onmouseout="this.style.background='transparent'">
        <div style="width:32px;height:32px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:16px;border:${isSpeaking?'2px solid var(--green)':'2px solid var(--border)'}">
          ${profilePhotos[n]?`<img src="${esc(profilePhotos[n])}" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>`:(esc(m.av||'🧑'))}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n)}${isMe?' (من)':''}</div>
          <div style="font-size:11px;color:${isSpeaking?'var(--green)':m.muted?'var(--red)':'var(--muted)'}">
            ${isSpeaking?'🎙 در حال صحبت':m.muted?'🔇 میوت':'🎤 آنلاین'}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  popup.innerHTML = html;
  popup.style.display = 'block';
  /* موقعیت زیر عنوان روم */
  popup.style.top = (rect.bottom + 6) + 'px';
  popup.style.left = Math.min(rect.left, window.innerWidth - 290) + 'px';

  setTimeout(()=>document.addEventListener('click', function h(e){
    if(!popup.contains(e.target) && e.target!==titleEl){
      popup.style.display='none';
      document.removeEventListener('click',h);
    }
  }), 100);
};

window.closeVoiceMembersMenu = function(){
  document.getElementById('voice-members-popup').style.display='none';
};


document.addEventListener('visibilitychange', async ()=>{
  if(document.visibilityState==='visible' && inVoice){
    /* heartbeat فوری */
    await heartbeat();
    /* peer هایی که قطع شدن رو دوباره وصل کن */
    await syncVoiceMembers();
    for(const peerName of Object.keys(voiceMembers)){
      if(peerName!==myName && !peers[peerName]){
        await connectToPeer(peerName, myName>peerName);
      }
    }
    /* audio element هایی که pause شدن رو resume کن */
    for(const p of Object.values(peers)){
      if(p.audioEl && p.audioEl.paused) p.audioEl.play().catch(()=>{});
    }
  }
});

/* ── وقتی اینترنت برمیگرده ── */
window.addEventListener('online', async ()=>{
  if(inVoice){
    toast('🔄 اتصال وویس در حال بازیابی…');
    await heartbeat();
    await syncVoiceMembers();
    for(const peerName of Object.keys(voiceMembers)){
      if(peerName!==myName && !peers[peerName]){
        await connectToPeer(peerName, myName>peerName);
      }
    }
  }
});


let dmPollTimer=null, dmCurrentPeer=null, dmLastId=0;

window.openDmList=async function(){
  const ov=document.getElementById('dm-list-overlay');
  ov.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('show')));
  document.getElementById('dm-search').value='';
  await loadDmConversations();
};
window.closeDmList=function(){
  const ov=document.getElementById('dm-list-overlay');
  ov.classList.remove('show');
  setTimeout(()=>{ if(!ov.classList.contains('show')) ov.style.display='none'; }, 350);
};

async function loadDmConversations(){
  const body=document.getElementById('dm-list-body');
  body.innerHTML='<div class="pf-loading">در حال بارگذاری…</div>';
  try{
    /* همه پیام‌هایی که من فرستادم یا گرفتم */
    const sent=await api(`/rest/v1/dm_messages?from_name=eq.${encodeURIComponent(myName)}&order=created_at.desc&select=*`);
    const recv=await api(`/rest/v1/dm_messages?to_name=eq.${encodeURIComponent(myName)}&order=created_at.desc&select=*`);
    const all=[...sent,...recv].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const convos={};
    all.forEach(m=>{
      const other = m.from_name===myName ? m.to_name : m.from_name;
      if(!convos[other]) convos[other]=m;
    });
    const names=Object.keys(convos);
    if(names.length===0){
      body.innerHTML='<div class="room-empty">هنوز گفتگویی نداری. از سرچ بالا یه کاربر رو پیدا کن و پیام بده 💬</div>';
      return;
    }
    /* گرفتن آواتار/عکس هر کاربر */
    const profiles={};
    for(const n of names){
      try{
        const rows=await api(`/rest/v1/profiles?name=eq.${encodeURIComponent(n)}&select=avatar,photo_url`);
        profiles[n]=rows[0]||{};
      }catch{ profiles[n]={}; }
    }
    body.innerHTML=names.map(n=>{
      const m=convos[n];
      const p=profiles[n]||{};
      const avHtml=p.photo_url?`<img src="${esc(p.photo_url)}" alt=""/>`:esc(p.avatar||'🧑');
      const preview=m.text.length>40?m.text.slice(0,40)+'…':m.text;
      const time=new Date(m.created_at).toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
      return `<div class="dm-item" onclick="openDmChat('${escJs(n)}')">
        <div class="dm-item-av">${avHtml}</div>
        <div class="dm-item-info">
          <div class="dm-item-name">${esc(n)}</div>
          <div class="dm-item-preview">${m.from_name===myName?'شما: ':''}${esc(preview)}</div>
        </div>
        <div class="dm-item-time">${time}</div>
      </div>`;
    }).join('');
  }catch{
    body.innerHTML='<div class="room-empty">خطا در بارگذاری</div>';
  }
}

window.searchDmUsers=async function(){
  const q=(document.getElementById('dm-search').value||'').trim().toLowerCase();
  const body=document.getElementById('dm-list-body');
  if(!q){ await loadDmConversations(); return; }
  try{
    const rows=await api(`/rest/v1/profiles?name=ilike.*${encodeURIComponent(q)}*&select=name,avatar,photo_url&limit=15`);
    const filtered=rows.filter(r=>r.name!==myName);
    if(filtered.length===0){
      body.innerHTML='<div class="room-empty">کاربری پیدا نشد 🔍</div>';
      return;
    }
    body.innerHTML=filtered.map(p=>{
      const avHtml=p.photo_url?`<img src="${esc(p.photo_url)}" alt=""/>`:esc(p.avatar||'🧑');
      return `<div class="dm-item" onclick="openDmChat('${escJs(p.name)}')">
        <div class="dm-item-av">${avHtml}</div>
        <div class="dm-item-info">
          <div class="dm-item-name">${esc(p.name)}</div>
          <div class="dm-item-preview">شروع گفتگو</div>
        </div>
      </div>`;
    }).join('');
  }catch{}
};

window.openDmChat=async function(peerName){
  closeDmList();
  dmCurrentPeer=peerName;
  dmLastId=0;
  document.getElementById('dm-chat-name').textContent=peerName;
  const av=document.getElementById('dm-chat-av');
  const photo=profilePhotos[peerName];
  if(photo) av.innerHTML=`<img src="${esc(photo)}" alt=""/>`;
  else{
    try{
      const rows=await api(`/rest/v1/profiles?name=eq.${encodeURIComponent(peerName)}&select=avatar,photo_url`);
      const p=rows[0]||{};
      if(p.photo_url){ av.innerHTML=`<img src="${esc(p.photo_url)}" alt=""/>`; profilePhotos[peerName]=p.photo_url; }
      else av.textContent=p.avatar||'🧑';
    }catch{ av.textContent='🧑'; }
  }

  const ov=document.getElementById('dm-chat-overlay');
  ov.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('show')));

  document.getElementById('dm-messages').innerHTML='';
  await loadDmMessages();
  if(dmPollTimer) clearInterval(dmPollTimer);
  dmPollTimer=setInterval(loadDmMessages, 2000);
};

window.closeDmChat=function(){
  const ov=document.getElementById('dm-chat-overlay');
  ov.classList.remove('show');
  setTimeout(()=>{ if(!ov.classList.contains('show')) ov.style.display='none'; }, 350);
  if(dmPollTimer){ clearInterval(dmPollTimer); dmPollTimer=null; }
  dmCurrentPeer=null;
};

async function loadDmMessages(){
  if(!dmCurrentPeer) return;
  try{
    const rows=await api(`/rest/v1/dm_messages?or=(and(from_name.eq.${encodeURIComponent(myName)},to_name.eq.${encodeURIComponent(dmCurrentPeer)}),and(from_name.eq.${encodeURIComponent(dmCurrentPeer)},to_name.eq.${encodeURIComponent(myName)}))&order=id.asc&select=*`);
    const container=document.getElementById('dm-messages');
    let added=false;
    rows.forEach(m=>{
      if(m.id>dmLastId){
        appendDmMsg(m);
        dmLastId=m.id;
        added=true;
      }
    });
    if(rows.length===0){
      container.innerHTML='<div class="dm-empty"><div class="empty-icon">💬</div><div class="empty-txt">اولین پیام رو بفرست!</div></div>';
    } else if(added){
      const em=container.querySelector('.dm-empty'); if(em) em.remove();
      const dm=document.getElementById('dm-messages'); dm.scrollTop=dm.scrollHeight;
    }
  }catch{}
}

function appendDmMsg(m){
  const container=document.getElementById('dm-messages');
  const isMine=m.from_name===myName;
  const timeStr=new Date(m.created_at).toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
  const row=document.createElement('div');
  row.className=`msg-row ${isMine?'mine':''}`;
  row.innerHTML=`
    <div class="mav-ph"></div>
    <div class="bwrap">
      <div class="bubble">${esc(m.text).replace(/\n/g,'<br>')}</div>
      <div class="bmeta">${timeStr}${isMine?' ✓✓':''}</div>
    </div>`;
  container.appendChild(row);
}

window.sendDm=async function(){
  const inp=document.getElementById('dm-input');
  const text=inp.value.trim();
  if(!text||!dmCurrentPeer) return;
  inp.value='';
  try{
    const rows=await api('/rest/v1/dm_messages',{method:'POST',body:JSON.stringify({from_name:myName,to_name:dmCurrentPeer,text})});
    if(rows&&rows[0]&&rows[0].id>dmLastId){
      const em=document.querySelector('.dm-empty'); if(em) em.remove();
      appendDmMsg(rows[0]); dmLastId=rows[0].id;
      const dm=document.getElementById('dm-messages'); dm.scrollTop=dm.scrollHeight;
    }
  }catch{ toast('❌ پیام ارسال نشد'); inp.value=text; }
};
document.getElementById('dm-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); sendDm(); }
});
