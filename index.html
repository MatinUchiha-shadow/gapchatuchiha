<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GapChat</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0b0d12; --surface:#13161f; --panel:#1a1e2a; --border:#252a3a;
  --accent:#7c6dfa; --accent2:#fa6d9b; --teal:#2dd4bf;
  --text:#e2e5f0; --muted:#6b7094;
  --font:'Vazirmatn',system-ui,sans-serif; --ease:.18s cubic-bezier(.4,0,.2,1);
}
[data-theme=light]{--bg:#f2f4fb;--surface:#fff;--panel:#e8ebf7;--border:#d0d5ea;--text:#1a1d2e;--muted:#6b6f8a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);transition:background var(--ease),color var(--ease)}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;outline:none;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
#app{display:flex;flex-direction:column;height:100vh}

/* LOGIN */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:28px;padding:24px}
.login-logo{width:70px;height:70px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(124,109,250,.35)}
.login-title{font-size:26px;font-weight:700}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:16px}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.ifield{padding:12px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;font-size:14px;width:100%;transition:border-color var(--ease)}
.ifield:focus{border-color:var(--accent)}
.av-row{display:flex;gap:8px;flex-wrap:wrap}
.av-opt{width:42px;height:42px;border-radius:11px;font-size:20px;background:var(--panel);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.av-opt:hover{border-color:var(--accent);transform:scale(1.08)}
.av-opt.sel{border-color:var(--accent);background:rgba(124,109,250,.15)}
.join-btn{padding:13px;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:all var(--ease);box-shadow:0 4px 16px rgba(124,109,250,.3)}
.join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,109,250,.4)}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.hl{display:flex;align-items:center;gap:10px}
.hav{width:36px;height:36px;border-radius:11px;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--panel)}
.hname{font-size:14px;font-weight:600}
.hstatus{font-size:11px;color:var(--muted)}
.hr{display:flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background var(--ease)}
.icon-btn:hover{background:var(--border)}
.call-btn{background:rgba(45,212,191,.15);color:var(--teal);}
.call-btn:hover{background:rgba(45,212,191,.25);}
.call-btn.active{background:rgba(45,212,191,.9);color:#0b0d12;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(45,212,191,.4)}50%{box-shadow:0 0 0 6px rgba(45,212,191,0)}}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:3px}
.msg-row{display:flex;gap:6px;align-items:flex-end;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-row.mine{flex-direction:row-reverse}
.msg-row.gtop{margin-top:10px}
.mav{width:26px;height:26px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mav-ph{width:26px;flex-shrink:0}
.bwrap{display:flex;flex-direction:column;max-width:70%}
.msg-row.mine .bwrap{align-items:flex-end}
.sname{font-size:10px;color:var(--muted);margin-bottom:3px;padding:0 3px}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word}
.msg-row:not(.mine) .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-right-radius:5px}
.msg-row.mine .bubble{background:var(--accent);color:#fff;border-bottom-left-radius:5px}
.bubble.call-evt{background:transparent;border:1px dashed var(--border);color:var(--muted);font-size:12px;text-align:center;padding:6px 12px;border-radius:99px}
.msg-row.mine .bubble.call-evt{background:transparent;border:1px dashed rgba(255,255,255,.3);color:rgba(255,255,255,.6)}
.bmeta{font-size:10px;color:var(--muted);margin-top:4px;padding:0 3px}
.msg-row.mine .bmeta{text-align:left;color:rgba(255,255,255,.5)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:.4}
.empty-icon{font-size:44px}
.empty-txt{font-size:13px;color:var(--muted)}

/* TYPING */
#typing{min-height:20px;padding:2px 14px 4px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.tdots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--muted);animation:db .8s infinite}
.tdots span:nth-child(2){animation-delay:.13s}
.tdots span:nth-child(3){animation-delay:.26s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* INPUT */
#input-bar{padding:10px 14px 14px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.estrip{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.estrip::-webkit-scrollbar{height:0}
.eq{width:30px;height:30px;border-radius:8px;font-size:16px;flex-shrink:0;background:var(--panel);display:flex;align-items:center;justify-content:center;transition:background var(--ease),transform var(--ease)}
.eq:hover{background:var(--border);transform:scale(1.1)}
.irow{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;padding:10px 14px;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;font-size:14px;resize:none;max-height:110px;line-height:1.55;transition:border-color var(--ease)}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--muted)}
#send-btn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:var(--accent);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all var(--ease);box-shadow:0 3px 12px rgba(124,109,250,.3)}
#send-btn:hover{transform:scale(1.06)}
#send-btn:active{transform:scale(.95)}

/* ── CALL OVERLAY ── */
#call-overlay{
  position:fixed;inset:0;z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  background:rgba(11,13,18,.92);backdrop-filter:blur(18px);
}
#call-overlay.show{display:flex}
.call-av{width:90px;height:90px;border-radius:28px;font-size:44px;
  display:flex;align-items:center;justify-content:center;
  background:var(--panel);border:2px solid var(--border);
  position:relative;}
.call-av::after{
  content:'';position:absolute;inset:-6px;border-radius:34px;
  border:2px solid var(--teal);opacity:0;
  animation:ring 1.8s infinite;
}
@keyframes ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.15);opacity:0}}
.call-av.ringing::after{animation:ring 1.8s infinite}
.call-av.connected::after{border-color:var(--teal);animation:none;opacity:1}
.call-name{font-size:20px;font-weight:700}
.call-status{font-size:13px;color:var(--muted)}
.call-dur{font-size:13px;color:var(--teal);font-weight:600;min-height:18px}
.call-actions{display:flex;gap:16px}
.ca-btn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .18s}
.ca-btn.hangup{background:#e5334a;color:#fff;box-shadow:0 4px 20px rgba(229,51,74,.4)}
.ca-btn.hangup:hover{transform:scale(1.08);background:#f04060}
.ca-btn.accept{background:var(--teal);color:#0b0d12;box-shadow:0 4px 20px rgba(45,212,191,.4)}
.ca-btn.accept:hover{transform:scale(1.08)}
.ca-btn.mute{background:var(--panel);border:1.5px solid var(--border);color:var(--text)}
.ca-btn.mute:hover{background:var(--border)}
.ca-btn.mute.on{background:rgba(250,109,155,.15);border-color:var(--accent2);color:var(--accent2)}

/* INCOMING BANNER */
#incoming-banner{
  position:fixed;top:0;left:0;right:0;z-index:199;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px;display:none;align-items:center;gap:12px;
  animation:slideDown .25s ease;
}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#incoming-banner.show{display:flex}
.ib-av{font-size:24px}
.ib-info{flex:1}
.ib-name{font-weight:600;font-size:14px}
.ib-sub{font-size:12px;color:var(--muted)}
.ib-btns{display:flex;gap:8px}
.ib-btn{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600}
.ib-btn.acc{background:var(--teal);color:#0b0d12}
.ib-btn.rej{background:rgba(229,51,74,.15);color:#e5334a;border:1px solid rgba(229,51,74,.3)}

/* TOAST / ERR */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--border);padding:9px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#err{display:none;background:#e5334a;color:#fff;font-size:12px;text-align:center;padding:7px}

@media(max-width:480px){.bwrap{max-width:82%}}
</style>
</head>
<body data-theme="dark">
<div id="app">
<div id="err"></div>

<!-- LOGIN -->
<div id="login">
  <div class="login-logo">💬</div>
  <div class="login-title">GapChat</div>
  <div class="login-card">
    <div>
      <div class="lbl">اسمت چیه؟</div>
      <input class="ifield" id="name-input" placeholder="مثلاً: علی، سارا…" maxlength="20"/>
    </div>
    <div>
      <div class="lbl">آواتار</div>
      <div class="av-row" id="av-row"></div>
    </div>
    <button class="join-btn" onclick="joinChat()">ورود به چت ←</button>
  </div>
</div>

<!-- HEADER -->
<header id="header" style="display:none">
  <div class="hl">
    <div class="hav" id="hav"></div>
    <div>
      <div class="hname" id="hname"></div>
      <div class="hstatus" id="hstatus">در حال اتصال…</div>
    </div>
  </div>
  <div class="hr">
    <button class="icon-btn call-btn" id="voice-btn" onclick="startCall()" title="تماس صوتی">📞</button>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button class="icon-btn" onclick="leaveChat()">🚪</button>
  </div>
</header>

<!-- CHAT -->
<div id="chat" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div id="messages">
    <div class="empty" id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-txt">اولین پیام رو بفرست!</div>
    </div>
  </div>
  <div id="typing"></div>
  <div id="input-bar">
    <div class="estrip" id="estrip"></div>
    <div class="irow">
      <textarea id="msg-input" rows="1" placeholder="پیام بنویس…"></textarea>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
</div>

<!-- INCOMING CALL BANNER -->
<div id="incoming-banner">
  <div class="ib-av" id="ib-av"></div>
  <div class="ib-info">
    <div class="ib-name" id="ib-name"></div>
    <div class="ib-sub">تماس صوتی ورودی…</div>
  </div>
  <div class="ib-btns">
    <button class="ib-btn acc" onclick="acceptCall()">📞 پاسخ</button>
    <button class="ib-btn rej" onclick="rejectCall()">✕ رد</button>
  </div>
</div>

<!-- ACTIVE CALL OVERLAY -->
<div id="call-overlay">
  <div class="call-av" id="co-av"></div>
  <div>
    <div class="call-name" id="co-name"></div>
    <div class="call-status" id="co-status"></div>
    <div class="call-dur" id="co-dur"></div>
  </div>
  <div class="call-actions" id="co-actions"></div>
</div>

<audio id="remote-audio" autoplay playsinline></audio>
<audio id="ring-audio" loop>
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." type="audio/wav"/>
</audio>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const SUPABASE_URL = 'https://qbvrxcvntaopmtzaorgc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFidnJ4Y3ZudGFvcG10emFvcmdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjA2MTEsImV4cCI6MjA5NjgzNjYxMX0.7Q0lsPJBOum43p-DmXdn6c9TPMgUGSr7JxyiQ_FTaio';

/* Public STUN servers برای WebRTC */
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' },
];

const AVATARS = ['🧑','👩','🧔','👱','🧑‍💻','👩‍💻','🦊','🐼','🐸','🐺'];
const EMOJIS  = ['😄','😂','❤️','🔥','👍','😍','🥺','😤','🎉','💯'];

let myName = null, myAv = AVATARS[0], selectedAv = AVATARS[0];
let lastId = 0, pollTimer = null, lastUid = '';

/* ══ WebRTC State ══ */
let pc = null;           // RTCPeerConnection
let localStream = null;  // میکروفون
let callState = 'idle';  // idle | outgoing | incoming | connected
let callWithName = '';   // طرف مقابل
let callWithAv = '';
let durTimer = null;
let durSec = 0;
let isMuted = false;

/* ─── BUILD UI ─── */
(function(){
  const avRow = document.getElementById('av-row');
  AVATARS.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='av-opt'+(i===0?' sel':'');
    b.textContent=a;
    b.onclick=()=>{ document.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); selectedAv=a; };
    avRow.appendChild(b);
  });
  const strip=document.getElementById('estrip');
  EMOJIS.forEach(e=>{
    const b=document.createElement('button');
    b.className='eq'; b.textContent=e;
    b.onclick=()=>{ const i=document.getElementById('msg-input'); i.value+=e; i.focus(); };
    strip.appendChild(b);
  });
})();

/* ─── API HELPERS ─── */
async function apiFetch(path, options={}){
  const res = await fetch(SUPABASE_URL+path,{
    ...options,
    headers:{ 'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(options.headers||{}) }
  });
  if(!res.ok){ const err=await res.text(); throw new Error(err); }
  const text=await res.text(); return text?JSON.parse(text):[];
}

/* ─── JOIN ─── */
window.joinChat = async function(){
  const n=document.getElementById('name-input').value.trim();
  if(!n){ toast('یه اسم وارد کن 😅'); return; }
  myName=n; myAv=selectedAv;
  document.getElementById('login').style.display='none';
  document.getElementById('header').style.display='flex';
  const chat=document.getElementById('chat');
  chat.style.display='flex'; chat.style.flexDirection='column';
  document.getElementById('hav').textContent=myAv;
  document.getElementById('hname').textContent=myName;
  document.getElementById('hstatus').textContent='متصل شد ✓';
  await loadMessages();
  startPolling();
};

/* ─── MESSAGES ─── */
async function loadMessages(){
  try{
    const rows=await apiFetch('/rest/v1/messages?order=id.asc&select=*');
    if(rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); }
    rows.forEach(r=>{ if(r.id>lastId){ appendMsg(r); lastId=r.id; } });
    scrollBottom();
  } catch(e){ showErr('خطا در بارگذاری: '+e.message); }
}

function startPolling(){
  pollTimer=setInterval(async()=>{
    try{
      const rows=await apiFetch(`/rest/v1/messages?id=gt.${lastId}&order=id.asc&select=*`);
      if(rows.length){
        const em=document.getElementById('empty-state'); if(em) em.remove();
        rows.forEach(r=>{ appendMsg(r); lastId=r.id; });
        scrollBottom();
      }
    } catch{}
    /* ── پول سیگنالینگ WebRTC ── */
    await pollSignals();
  }, 2000);
}

window.sendMsg = async function(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text||!myName) return;
  inp.value=''; inp.style.height='';
  try{
    const rows=await apiFetch('/rest/v1/messages',{ method:'POST', body:JSON.stringify({name:myName,avatar:myAv,text}) });
    if(rows&&rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); if(rows[0].id>lastId){ appendMsg(rows[0]); lastId=rows[0].id; scrollBottom(); } }
  } catch(e){ showErr('پیام ارسال نشد: '+e.message); inp.value=text; }
};

function appendMsg(msg){
  const container=document.getElementById('messages');
  const isMine=msg.name===myName;
  const dt=new Date(msg.created_at);
  const timeStr=dt.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});
  const gapTop=msg.name!==lastUid; lastUid=msg.name;

  /* پیام‌های سیستم تماس */
  if(msg.text&&msg.text.startsWith('__CALL__')) return; /* سیگنال‌ها رو نشون نده */

  const row=document.createElement('div');
  row.className=`msg-row ${isMine?'mine':''} ${gapTop?'gtop':''}`;
  const isCallEvt = msg.text&&msg.text.startsWith('__EVT__');
  const displayText = isCallEvt ? msg.text.replace('__EVT__','') : esc(msg.text).replace(/\n/g,'<br>');
  row.innerHTML=`
    ${gapTop?`<div class="mav">${esc(msg.avatar||'🧑')}</div>`:`<div class="mav-ph"></div>`}
    <div class="bwrap">
      ${(!isMine&&gapTop)?`<div class="sname">${esc(msg.name)}</div>`:''}
      <div class="bubble${isCallEvt?' call-evt':''}">${displayText}</div>
      ${!isCallEvt?`<div class="bmeta">${timeStr}${isMine?' ✓✓':''}</div>`:''}
    </div>`;
  container.appendChild(row);
}

/* ═══════════════════════════════════════
   ── WEBRTC SIGNALING (via Supabase) ──
   جدول: signals (id, from_name, to_name, type, payload, created_at)
   type: offer | answer | candidate | hangup | call_request | call_reject
═══════════════════════════════════════ */

let lastSignalId = 0;

async function sendSignal(type, payload, toName=''){
  try{
    await apiFetch('/rest/v1/signals',{
      method:'POST',
      body:JSON.stringify({ from_name:myName, from_av:myAv, to_name:toName||'', type, payload:JSON.stringify(payload) })
    });
  } catch(e){ /* silent */ }
}

async function pollSignals(){
  if(!myName) return;
  try{
    const rows=await apiFetch(
      `/rest/v1/signals?id=gt.${lastSignalId}&order=id.asc&select=*`
    );
    for(const row of rows){
      if(row.id>lastSignalId) lastSignalId=row.id;
      /* فقط پیام‌های مخصوص ما */
      if(row.from_name===myName) continue; /* خودمون فرستادیم */
      if(row.to_name && row.to_name!==myName) continue;
      await handleSignal(row);
    }
  } catch{}
}

async function handleSignal(sig){
  const payload = sig.payload ? JSON.parse(sig.payload) : {};
  switch(sig.type){
    case 'call_request':
      if(callState!=='idle') { await sendSignal('call_reject',{},sig.from_name); return; }
      callWithName=sig.from_name; callWithAv=sig.from_av||'🧑';
      showIncomingBanner();
      break;
    case 'call_reject':
      if(callState==='outgoing'){
        closeCallUI();
        toast(callWithName+' تماس رو رد کرد');
        addCallEvent('📵 تماس رد شد');
      }
      break;
    case 'offer':
      if(callState==='incoming'||callState==='outgoing'){
        await createPC();
        await pc.setRemoteDescription(new RTCSessionDescription(payload));
        const answer=await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await sendSignal('answer',answer,sig.from_name);
        callWithName=sig.from_name; callWithAv=sig.from_av||callWithAv;
        setCallConnected();
      }
      break;
    case 'answer':
      if(pc && callState==='outgoing'){
        await pc.setRemoteDescription(new RTCSessionDescription(payload));
        setCallConnected();
      }
      break;
    case 'candidate':
      if(pc){
        try{ await pc.addIceCandidate(new RTCIceCandidate(payload)); } catch{}
      }
      break;
    case 'hangup':
      if(callState==='connected'||callState==='incoming'||callState==='outgoing'){
        const who=callWithName;
        endCallLocal(false);
        toast(who+' تماس رو قطع کرد');
        addCallEvent('📵 '+who+' تماس رو قطع کرد');
      }
      break;
  }
}

/* ═══════════════════════════════════════
   ── CALL FLOW ──
═══════════════════════════════════════ */

/* دکمه تماس در هدر */
window.startCall = async function(){
  if(callState!=='idle'){ toast('در حال تماس هستی'); return; }
  /* نام طرف مقابل رو از کاربر بگیر */
  const target=prompt('اسم کسی که می‌خوای زنگ بزنی؟');
  if(!target||!target.trim()) return;
  if(target.trim()===myName){ toast('نمی‌تونی به خودت زنگ بزنی 😄'); return; }
  callWithName=target.trim();
  callWithAv='📞';
  callState='outgoing';
  showCallOverlay('outgoing');
  await sendSignal('call_request',{ av:myAv }, callWithName);
  toast('داری زنگ می‌زنی به '+callWithName+'…');
  /* بعد از 30 ثانیه اگه جواب نداد */
  setTimeout(()=>{ if(callState==='outgoing'){ closeCallUI(); toast(callWithName+' جواب نداد'); addCallEvent('📵 پاسخ داده نشد'); } },30000);
};

window.acceptCall = async function(){
  document.getElementById('incoming-banner').classList.remove('show');
  callState='incoming';
  showCallOverlay('incoming');
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  } catch{
    toast('دسترسی به میکروفون رد شد!'); closeCallUI(); return;
  }
  await createPC();
  /* Caller باید offer بفرسته */
  await sendSignal('offer_ready',{},callWithName); /* اعلام آمادگی */
  /* در واقع کسی که قبول کرده منتظر offer می‌مونه (از startCallOffer) */
  await startCallOffer();
};

async function startCallOffer(){
  /* این تابع توسط caller بعد از دریافت قبول فراخوانی می‌شه */
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  } catch{
    toast('دسترسی به میکروفون رد شد!'); closeCallUI(); return;
  }
  await createPC();
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  await sendSignal('offer',offer,callWithName);
}

window.rejectCall = async function(){
  document.getElementById('incoming-banner').classList.remove('show');
  await sendSignal('call_reject',{},callWithName);
  callWithName=''; callWithAv=''; callState='idle';
};

async function createPC(){
  if(pc){ pc.close(); }
  pc=new RTCPeerConnection({ iceServers:ICE_SERVERS });
  if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.onicecandidate=e=>{ if(e.candidate) sendSignal('candidate',e.candidate,callWithName); };
  pc.ontrack=e=>{ document.getElementById('remote-audio').srcObject=e.streams[0]; };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='disconnected'||pc.connectionState==='failed'){
      if(callState==='connected'){ endCallLocal(false); toast('اتصال قطع شد'); }
    }
  };
}

/* وقتی هر دو طرف آماده شدن */
function setCallConnected(){
  callState='connected';
  updateCallOverlay('connected');
  startDurTimer();
  document.getElementById('voice-btn').classList.add('active');
  addCallEvent('📞 تماس با '+callWithName+' برقرار شد');
}

window.hangupCall = async function(){
  await sendSignal('hangup',{},callWithName);
  const dur=formatDur(durSec);
  endCallLocal(true);
  addCallEvent('📵 تماس قطع شد — '+dur);
};

function endCallLocal(addEvt){
  clearInterval(durTimer); durSec=0;
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(pc){ pc.close(); pc=null; }
  document.getElementById('remote-audio').srcObject=null;
  closeCallUI();
  document.getElementById('voice-btn').classList.remove('active');
}

function closeCallUI(){
  callState='idle'; callWithName=''; callWithAv='';
  document.getElementById('call-overlay').classList.remove('show');
  document.getElementById('incoming-banner').classList.remove('show');
  clearInterval(durTimer); durSec=0;
  document.getElementById('co-dur').textContent='';
  isMuted=false;
}

/* ─── مدیریت signal "offer_ready" ─── */
/* وقتی callee قبول کرد، caller باید offer بفرسته */
const _origHandleSignal = handleSignal;
async function handleSignal(sig){
  if(sig.type==='offer_ready' && callState==='outgoing'){
    await startCallOffer();
    return;
  }
  await _origHandleSignal(sig);
}

/* ═══════════════════════════════════════
   ── CALL OVERLAY UI ──
═══════════════════════════════════════ */
function showCallOverlay(mode){
  const ov=document.getElementById('call-overlay');
  ov.classList.add('show');
  document.getElementById('co-av').textContent=callWithAv||'📞';
  document.getElementById('co-av').className='call-av'+(mode==='connected'?' connected':' ringing');
  document.getElementById('co-name').textContent=callWithName;
  document.getElementById('co-status').textContent=mode==='outgoing'?'در حال زنگ خوردن…':mode==='incoming'?'در حال اتصال…':'متصل';
  buildCallActions(mode);
}

function updateCallOverlay(mode){
  document.getElementById('co-av').className='call-av'+(mode==='connected'?' connected':' ringing');
  document.getElementById('co-status').textContent=mode==='connected'?'متصل شد ✓':'…';
  buildCallActions(mode);
}

function buildCallActions(mode){
  const wrap=document.getElementById('co-actions');
  wrap.innerHTML='';
  if(mode==='connected'){
    const muteBtn=document.createElement('button');
    muteBtn.className='ca-btn mute'+(isMuted?' on':'');
    muteBtn.textContent=isMuted?'🔇':'🎤';
    muteBtn.title='میکروفون';
    muteBtn.onclick=()=>{
      isMuted=!isMuted;
      if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
      muteBtn.className='ca-btn mute'+(isMuted?' on':'');
      muteBtn.textContent=isMuted?'🔇':'🎤';
    };
    wrap.appendChild(muteBtn);
  }
  const hangBtn=document.createElement('button');
  hangBtn.className='ca-btn hangup';
  hangBtn.textContent='📵';
  hangBtn.title='قطع تماس';
  hangBtn.onclick=hangupCall;
  wrap.appendChild(hangBtn);
}

function showIncomingBanner(){
  const ban=document.getElementById('incoming-banner');
  document.getElementById('ib-av').textContent=callWithAv||'📞';
  document.getElementById('ib-name').textContent=callWithName;
  ban.classList.add('show');
}

/* ─── تایمر مدت تماس ─── */
function startDurTimer(){
  durSec=0;
  durTimer=setInterval(()=>{ durSec++; document.getElementById('co-dur').textContent=formatDur(durSec); },1000);
}
function formatDur(s){ const m=Math.floor(s/60); return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

/* ─── پیام رویداد تماس ─── */
async function addCallEvent(text){
  try{
    const rows=await apiFetch('/rest/v1/messages',{ method:'POST', body:JSON.stringify({name:myName,avatar:myAv,text:'__EVT__'+text}) });
    if(rows&&rows.length){ const em=document.getElementById('empty-state'); if(em) em.remove(); if(rows[0].id>lastId){ appendMsg(rows[0]); lastId=rows[0].id; scrollBottom(); } }
  } catch{}
}

/* ═══════════════════════════════════════
   ── MISC ──
═══════════════════════════════════════ */
document.getElementById('msg-input').addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,110)+'px';
});
document.getElementById('msg-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
});
document.getElementById('name-input').addEventListener('keydown',e=>{ if(e.key==='Enter') joinChat(); });

window.leaveChat=function(){
  if(!confirm('از چت خارج بشی؟')) return;
  if(callState!=='idle') hangupCall();
  clearInterval(pollTimer); location.reload();
};

window.toggleTheme=function(){
  const b=document.body; const d=b.getAttribute('data-theme')==='dark';
  b.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('theme-btn').textContent=d?'🌙':'☀️';
};

function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',5000); }
</script>
